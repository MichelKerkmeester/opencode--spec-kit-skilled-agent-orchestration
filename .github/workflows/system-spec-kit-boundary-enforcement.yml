name: system-spec-kit-boundary-enforcement

on:
  pull_request:
    paths:
      - ".opencode/skill/system-spec-kit/**"
      - ".github/workflows/system-spec-kit-boundary-enforcement.yml"
  push:
    branches:
      - main
    paths:
      - ".opencode/skill/system-spec-kit/**"
      - ".github/workflows/system-spec-kit-boundary-enforcement.yml"

jobs:
  boundary-enforcement:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: .opencode/skill/system-spec-kit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: .opencode/skill/system-spec-kit/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build referenced TypeScript declarations
        run: npx tsc -b shared/tsconfig.json mcp_server/tsconfig.json

      - name: Run baseline boundary checks
        run: npm run check --workspace=scripts

      - name: Run AST enforcement checks
        run: npm run check:ast --workspace=scripts
