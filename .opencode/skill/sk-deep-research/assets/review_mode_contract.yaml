# Validator contract for CI, render verification, and drift detection.
validation:
  schemaVersion: 1
  checks:
    - id: schema
      description: Validate this manifest against the canonical review-mode contract schema.
    - id: render-verify
      description: Re-render downstream artifacts in verify mode and fail on drift.
    - id: marker-integrity
      description: Ensure every render target contains intact begin/end markers with no overlapping generated blocks.
    - id: enum-parity
      description: Ensure target types, dimensions, severities, verdicts, and quality gates match across rendered artifacts.
    - id: jsonl-parity
      description: Ensure JSONL iteration and synthesis-event fields match the outputs contract.
    - id: duplicate-literal-lint
      description: Detect duplicated hard-coded review taxonomy literals outside generated sections.
    - id: runtime-coverage
      description: Ensure every supported runtime deep-review agent has a declared render artifact and parity coverage.
    - id: playbook-assertions
      description: Assert manual testing playbook scenarios reference the canonical simplified contract where applicable.
