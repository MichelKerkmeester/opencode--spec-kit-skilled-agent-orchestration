# ─────────────────────────────────────────────────────────────────
# AGENT IMPROVER: EVALUATION LOOP (INTERACTIVE MODE)
# ─────────────────────────────────────────────────────────────────
role: Agent Improvement Specialist using sk-improve-agent with operator approval
purpose: Integration-aware agent evaluation with 5-dimension scoring, deterministic benchmarks, and guarded promotion
action: Scan integration surfaces, generate dynamic profiles, score candidates across 5 dimensions, reduce evidence, and pause at each decision gate

# ─────────────────────────────────────────────────────────────────
# OPERATING MODE
# ─────────────────────────────────────────────────────────────────
operating_mode:
  workflow: iterative_evaluation_loop
  workflow_compliance: MANDATORY
  workflow_execution: interactive
  approvals: multi_gate
  tracking: append_only_jsonl_ledger
  validation: 5_dimension_deterministic_scoring
  promotion: guarded_canonical_only
  description: |
    Executes the agent improvement loop with operator approval gates at key decision points.
    Each iteration: scan integration -> propose candidate -> score across 5 dimensions -> benchmark -> reduce -> present gate.
    The operator controls progression: approve each candidate generation, review scores before continuing,
    and explicitly authorize any promotion. Stops when: operator chooses stop, max iterations reached,
    all dimensions plateau (3+ identical scores), infra failures exceed threshold, or reducer signals shouldStop.

# ─────────────────────────────────────────────────────────────────
# EVALUATION PHILOSOPHY
# ─────────────────────────────────────────────────────────────────
evaluation_philosophy:
  principle: "Prove improvement before mutation"
  approach: "Integration-aware 5-dimension evaluation with deterministic scoring"
  mandate: "Every candidate is bounded, every score is repeatable, every decision is auditable"

# ─────────────────────────────────────────────────────────────────
# USER INPUTS
# ─────────────────────────────────────────────────────────────────
user_inputs:
  target_path: "[TARGET_PATH] - Path to the agent .md file to evaluate. REQUIRED. Any file in .opencode/agent/*.md."
  target_profile: "[TARGET_PROFILE] - Profile ID: handover, context-prime, or dynamic. Auto-derived from target_path if not explicit."
  scoring_mode: "[SCORING_MODE] - 'dynamic' for 5-dimension any-agent scoring, 'static' for legacy keyword profiles. Default: dynamic."
  spec_folder: "[SPEC_FOLDER] - Spec folder path for improvement runtime. REQUIRED."
  max_iterations: "[MAX_ITERATIONS] - Maximum loop iterations before forced stop. Default: 5."
  execution_mode: "[EXECUTION_MODE] - AUTONOMOUS or INTERACTIVE. Derived from :auto/:confirm suffix."

# ─────────────────────────────────────────────────────────────────
# FIELD HANDLING
# ─────────────────────────────────────────────────────────────────
field_handling:
  # Field mapping: target_path -> target_profile (inferred), agent_name (basename without .md)
  derived_fields:
    agent_name: "Basename of target_path without .md; use this as the real scan-integration.cjs agent identifier."
  defaults:
    scoring_mode_empty: "dynamic"
    max_iterations_empty: "5"
    target_profile_empty: "Derive from target_path: handover -> handover, context-prime -> context-prime, anything else -> dynamic"
  validation:
    target_path_required: true
    spec_folder_required: true
    target_path_must_exist: true
    target_path_must_be_agent: "Must match .opencode/agent/*.md pattern"

# ─────────────────────────────────────────────────────────────────
# CONTEXT LOADING
# ─────────────────────────────────────────────────────────────────
context_loading:
  trigger: "At workflow START, before phase_init"
  mcp_integration:
    tool: memory_search
    note: "Call MCP tools directly - NEVER through Code Mode"
    parameters: { query: "agent improvement context for {agent_name}", specFolder: "{spec_folder}", anchors: ['summary', 'decisions', 'state', 'improvement'] }
  command_reference: "/memory:search"
  when_to_skip: ["First-time evaluation of this agent", "User explicitly says 'skip context' or 'fresh start'", "No spec folder context exists"]
  behavior:
    if_context_found: "Surface prior improvement history, best-known scores, and dimensional trends before first iteration"
    if_no_context: "Proceed to phase_init without delay"
  checkpoint:
    question: "Prior improvement context found for this agent. Load it?"
    options:
      - { label: "A) Load context", description: "Review prior scores and improvement history" }
      - { label: "B) Skip", description: "Start fresh without prior context" }

# ─────────────────────────────────────────────────────────────────
# SKILL REFERENCE
# ─────────────────────────────────────────────────────────────────
skill_reference:
  skill: sk-improve-agent
  skill_md: .opencode/skill/sk-improve-agent/SKILL.md
  templates:
    config: .opencode/skill/sk-improve-agent/assets/improvement_config.json
    strategy: .opencode/skill/sk-improve-agent/assets/improvement_strategy.md
    charter: .opencode/skill/sk-improve-agent/assets/improvement_charter.md
    manifest: .opencode/skill/sk-improve-agent/assets/target_manifest.jsonc
  scripts:
    scanner: .opencode/skill/sk-improve-agent/scripts/scan-integration.cjs
    profiler: .opencode/skill/sk-improve-agent/scripts/generate-profile.cjs
    scorer: .opencode/skill/sk-improve-agent/scripts/score-candidate.cjs
    benchmark: .opencode/skill/sk-improve-agent/scripts/run-benchmark.cjs
    journal: .opencode/skill/sk-improve-agent/scripts/improvement-journal.cjs
    reducer: .opencode/skill/sk-improve-agent/scripts/reduce-state.cjs

# ─────────────────────────────────────────────────────────────────
# STATE PATHS
# ─────────────────────────────────────────────────────────────────
state_paths:
  runtime_root: "{spec_folder}/improvement"
  candidates_root: "{spec_folder}/improvement/candidates"
  config: "{spec_folder}/improvement/agent-improvement-config.json"
  state_log: "{spec_folder}/improvement/agent-improvement-state.jsonl"
  strategy: "{spec_folder}/improvement/agent-improvement-strategy.md"
  charter: "{spec_folder}/improvement/agent-improvement-charter.md"
  manifest: "{spec_folder}/improvement/target-manifest.jsonc"
  dashboard: "{spec_folder}/improvement/agent-improvement-dashboard.md"
  registry: "{spec_folder}/improvement/experiment-registry.json"
  integration_report: "{spec_folder}/improvement/integration-report.json"
  benchmark_root: "{spec_folder}/improvement/benchmark-runs/{target_profile}"

# ─────────────────────────────────────────────────────────────────
# WORKFLOW
# ─────────────────────────────────────────────────────────────────
workflow:
  phase_init:
    description: "Create runtime structure, scan integration surfaces, present init gate, record baseline"
    steps:
      gate_session_boundary:
        type: approval_gate
        description: "Confirm a fresh standalone session boundary before init writes"
        verify:
          - lineage_mode_must_equal_new: "Improve-agent currently ships only `new` sessions; resume/restart/fork/completed-continue are not runtime-wired."
          - existing_runtime_must_be_archived: "If {spec_folder}/improvement already exists from a prior run, archive or replace it instead of resuming in place."
          - dormant_resume_fields_disallowed: "Do not populate continuedFromIteration, resumeMode, or carried-forward parentSessionId state."
        on_fail: "Halt with STATUS=FAIL and instruct the operator to archive the prior improvement packet before re-running."
        present: |
          improve-agent currently supports only fresh `new` sessions.
          If `{spec_folder}/improvement` already contains prior state, archive or replace it instead of resuming in place.
          Options:
          A) Continue with a fresh session boundary
          B) Cancel
      step_create_directories:
        description: "Create improvement runtime directories"
        command: "mkdir -p {spec_folder}/improvement/candidates {spec_folder}/improvement/benchmark-runs/{target_profile}"
      step_scan_integration:
        description: "Map all surfaces the target agent touches across the repo"
        command: "node .opencode/skill/sk-improve-agent/scripts/scan-integration.cjs --agent={agent_name} --output={spec_folder}/improvement/integration-report.json"
      step_generate_profile:
        description: "Generate dynamic scoring profile from the agent's own rules (skip if static profile)"
        condition: "scoring_mode == 'dynamic'"
        command: "node .opencode/skill/sk-improve-agent/scripts/generate-profile.cjs --agent={target_path} --output={spec_folder}/improvement/dynamic-profile.json"
      step_copy_templates:
        description: "Copy config, strategy, charter, and manifest templates into runtime root"
        action: "Copy config, strategy, charter, and manifest templates into the runtime root"
      gate_init:
        type: approval_gate
        description: "Operator reviews initialization before recording baseline"
        present: |
          Improvement packet initialized for `{target_path}` using profile `{target_profile}`.
          Integration scan complete: {integration_report_summary}.
          Proposal-first mode is active.
          Options:
          A) Record baseline and continue to first iteration
          B) Cancel
      step_record_baseline:
        description: "Record baseline candidate state in append-only ledger"
        action: "Append a baseline record for {target_path} into agent-improvement-state.jsonl"
      step_emit_journal_event:
        description: "Emit session_start journal event before the first loop iteration begins"
        command: "node .opencode/skill/sk-improve-agent/scripts/improvement-journal.cjs --emit session_start --journal {spec_folder}/improvement/improvement-journal.jsonl --details '{\"sessionId\":\"{session_id}\",\"target\":\"{target_path}\",\"charter\":\"{spec_folder}/improvement/agent-improvement-charter.md\",\"startedAt\":\"{started_at}\"}'"

  phase_loop:
    description: "Iterative propose -> score -> benchmark -> reduce cycle with operator gates"
    repeat: true
    max_repeats: "{max_iterations}"
    steps:
      step_scan_integration:
        description: "Refresh integration surface map before each iteration"
        command: "node .opencode/skill/sk-improve-agent/scripts/scan-integration.cjs --agent={agent_name} --output={spec_folder}/improvement/integration-report.json"
      gate_before_candidate:
        type: approval_gate
        description: "Operator authorizes candidate generation for this iteration"
        present: |
          Ready to generate candidate #{iteration} for `{target_path}`.
          Options:
          A) Generate candidate
          B) Stop loop
      step_generate_candidate:
        description: "Dispatch @improve-agent to write one bounded candidate"
        action: "Dispatch @improve-agent to write a new candidate into candidates/"
      step_emit_journal_event_candidate_generated:
        description: "Emit candidate_generated journal event after the candidate is written"
        command: "node .opencode/skill/sk-improve-agent/scripts/improvement-journal.cjs --emit candidate_generated --journal {spec_folder}/improvement/improvement-journal.jsonl --details '{\"sessionId\":\"{session_id}\",\"iteration\":\"{iteration}\",\"candidateId\":\"{candidate_id}\",\"candidatePath\":\"{candidate_path}\"}'"
      step_record_candidate_lineage:
        description: "Record the generated candidate in the packet-local lineage graph"
        command: "node -e \"const lineage=require('./.opencode/skill/sk-improve-agent/scripts/candidate-lineage.cjs'); lineage.recordCandidate('{spec_folder}/improvement/candidate-lineage.json',{candidateId:'{candidate_id}',sessionId:'{session_id}',waveIndex:0,mutationType:'candidate-proposal',parentCandidateId:null,iteration:Number('{iteration}')});\""
      step_score_candidate:
        description: "Score candidate across 5 dimensions (dynamic) or keyword checks (static)"
        command: "node .opencode/skill/sk-improve-agent/scripts/score-candidate.cjs --candidate={candidate_path} --baseline={target_path} --manifest={spec_folder}/improvement/target-manifest.jsonc --profile={target_profile} --target={target_path} --output={score_output_path}"
      step_emit_journal_event_candidate_scored:
        description: "Emit candidate_scored journal event after scoring completes"
        command: "node .opencode/skill/sk-improve-agent/scripts/improvement-journal.cjs --emit candidate_scored --journal {spec_folder}/improvement/improvement-journal.jsonl --details '{\"sessionId\":\"{session_id}\",\"iteration\":\"{iteration}\",\"candidateId\":\"{candidate_id}\",\"scoreOutputPath\":\"{score_output_path}\",\"weightedScore\":\"{weighted_score}\"}'"
      step_record_mutation_coverage:
        description: "Record mutation coverage and per-dimension trajectory from the scored candidate"
        command: "node -e \"const fs=require('node:fs'); const coverage=require('./.opencode/skill/sk-improve-agent/scripts/mutation-coverage.cjs'); const score=JSON.parse(fs.readFileSync('{score_output_path}','utf8')); const dimensions=Array.isArray(score.dimensions)?score.dimensions:[]; const scores=Object.fromEntries(dimensions.map((entry)=>[entry.name,entry.score])); coverage.recordMutation('{spec_folder}/improvement/mutation-coverage.json',{dimension:'composite',mutationType:'candidate-proposal',candidateId:'{candidate_id}',iteration:Number('{iteration}'),outcome:score.recommendation||'scored'}); coverage.recordTrajectory('{spec_folder}/improvement/mutation-coverage.json',{iteration:Number('{iteration}'),scores,weightedScore:Number('{weighted_score}')});\""
      step_run_benchmark:
        description: "Run fixture tests against packet-local outputs"
        action: "Run profile fixtures against packet-local outputs under benchmark-runs/{target_profile}/"
      step_measure_benchmark_stability:
        description: "Measure replay stability for the current scored candidate and emit a repeatability report"
        command: "node -e \"const fs=require('node:fs'); const stability=require('./.opencode/skill/sk-improve-agent/scripts/benchmark-stability.cjs'); const score=JSON.parse(fs.readFileSync('{score_output_path}','utf8')); const result=stability.measureStability([score],{minReplayCount:3,warningThreshold:0.95}); fs.writeFileSync('{spec_folder}/improvement/benchmark-runs/{target_profile}/iteration-{iteration}-repeatability.json',JSON.stringify(result,null,2)+'\\n');\""
      step_detect_trade_offs:
        description: "Analyze the scored trajectory for Pareto trade-offs before reduction"
        command: "node -e \"const fs=require('node:fs'); const detector=require('./.opencode/skill/sk-improve-agent/scripts/trade-off-detector.cjs'); const trajectory=detector.getTrajectory('{spec_folder}/improvement/improvement-journal.jsonl'); const tradeOffs=detector.detectTradeOffs(trajectory); fs.writeFileSync('{spec_folder}/improvement/trade-off-report.json',JSON.stringify({iteration:Number('{iteration}'),tradeOffs},null,2)+'\\n');\""
      step_append_ledger:
        description: "Record scored results in append-only JSONL ledger"
        action: "Append prompt-score and benchmark records into agent-improvement-state.jsonl"
      step_reduce:
        description: "Refresh dashboard, registry, and dimensional progress"
        command: "node .opencode/skill/sk-improve-agent/scripts/reduce-state.cjs {spec_folder}/improvement"
      gate_after_score:
        type: approval_gate
        description: "Operator reviews scores and decides next action"
        present: |
          Candidate scored. Review dimensional progress in dashboard.
          Options:
          A) Continue to next iteration
          B) Promote accepted candidate (handover only, requires evidence)
          C) Stop loop
      step_emit_journal_event_gate_evaluation:
        description: "Emit gate_evaluation journal event after the operator gate is evaluated"
        command: "node .opencode/skill/sk-improve-agent/scripts/improvement-journal.cjs --emit gate_evaluation --journal {spec_folder}/improvement/improvement-journal.jsonl --details '{\"sessionId\":\"{session_id}\",\"iteration\":\"{iteration}\",\"gateName\":\"gate_after_score\",\"gateDecision\":\"{gate_after_score}\",\"stopReason\":\"{stop_reason}\"}'"
      step_promote_candidate:
        description: "Promote the accepted candidate to canonical target (guarded, requires score evidence)"
        condition: "gate_after_score == 'B' AND score_recommendation == 'candidate-better'"
        command: "node .opencode/skill/sk-improve-agent/scripts/promote-candidate.cjs --candidate={candidate_path} --target={target_path} --score={score_output_path} --benchmark-report={benchmark_output_path} --repeatability-report={repeatability_output_path} --config={spec_folder}/improvement/agent-improvement-config.json --manifest={spec_folder}/improvement/target-manifest.jsonc --archive-dir={spec_folder}/improvement/archive --approve"

  phase_synthesis:
    description: "After loop exits, summarize findings and recommend next action"
    steps:
      step_final_dashboard:
        description: "Present final dashboard with per-dimension trends and stop reason"
        action: "Read dashboard.md and present summary to operator"
      step_recommendation:
        description: "Recommend continue, promote, or stop based on reducer output"
        action: "Check experiment-registry.json for bestPromptRecord and stopStatus"
      step_emit_journal_event:
        description: "Emit session_end journal event after synthesis completes"
        command: "node .opencode/skill/sk-improve-agent/scripts/improvement-journal.cjs --emit session_end --journal {spec_folder}/improvement/improvement-journal.jsonl --details '{\"sessionId\":\"{session_id}\",\"stopReason\":\"{stop_reason}\",\"sessionOutcome\":\"{session_outcome}\",\"endedAt\":\"{ended_at}\",\"totalIterations\":\"{total_iterations}\"}'"
