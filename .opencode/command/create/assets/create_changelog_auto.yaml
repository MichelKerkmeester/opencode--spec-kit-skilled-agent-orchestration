# ─────────────────────────────────────────────────────────────────
# OPENCODE CREATE: CHANGELOG CREATION WORKFLOW (AUTO MODE)
# ─────────────────────────────────────────────────────────────────
# Mode: autonomous (no user approval gates)
# Note: This workflow executes all steps sequentially with
#       continuous self-validation. Pauses only if confidence < 40%.
# ─────────────────────────────────────────────────────────────────
role: Expert Changelog Creator with dynamic work detection
purpose: Create properly formatted changelog entries by analyzing recent work and resolving components
action: Detect work context, resolve component folder, calculate version, generate formatted changelog

# ─────────────────────────────────────────────────────────────────
# PREREQUISITE: @write AGENT VERIFICATION
# ─────────────────────────────────────────────────────────────────
# This workflow REQUIRES the @write agent for:
#   - Template-first workflow (loads format before generating)
#   - Changelog format validation
#   - Version number verification
#
# PHASE 0 in the command markdown verifies @write agent BEFORE
# this YAML workflow loads. If you're executing this workflow,
# @write verification has already passed.
#
# To invoke correctly: @write /create:changelog [source]
# ─────────────────────────────────────────────────────────────────

operating_mode:
  workflow: sequential_7_step
  workflow_compliance: MANDATORY
  workflow_execution: autonomous
  approvals: none
  tracking: progressive_task_checklists
  validation: continuous_self_validation

development_philosophy:
  principle: "Detect accurately, format consistently"
  approach: "Analyze -> Resolve -> Calculate -> Generate -> Validate -> Write"
  mandate: "Dynamic detection with human-quality output matching 370+ existing changelogs"

runtime_agent_path_resolution:
  default: .opencode/agent
  claude: .claude/agents
  codex: .codex/agents
  gemini: .gemini/agents

# ─────────────────────────────────────────────────────────────────
# CONFIDENCE & CLARIFICATION FRAMEWORK
# ─────────────────────────────────────────────────────────────────
confidence_framework:
  thresholds:
    high: { range: "80-100%", action: "Proceed with citable source" }
    medium:
      { range: "40-79%", action: "Proceed with caution, document assumptions" }
    low:
      { range: "0-39%", action: "STOP - Ask clarification with A/B/C options" }

  scoring_weights:
    work_context_availability: 0.30
    component_resolution_confidence: 0.25
    version_calculation_certainty: 0.25
    content_completeness: 0.20

  clarification_format: |
    "I need clarity (confidence: [NN%]). Which approach:
    - A) [option with brief rationale]
    - B) [option with brief rationale]
    - C) [option with brief rationale]"

  escalation:
    timebox_minutes: 10
    failed_attempts_threshold: 2
    action: "Present options to user with current findings"

# ─────────────────────────────────────────────────────────────────
# REQUEST ANALYSIS FRAMEWORK
# ─────────────────────────────────────────────────────────────────
request_analysis_framework:
  code_search_note: "Use CocoIndex (mcp__cocoindex_code__search) for discovering existing patterns before creating. Use Grep only for exact known tokens."
  solution_flow:
    - "Parse input: spec folder path, component name, or auto-detect mode"
    - "Gather context: Read spec artifacts or git history"
    - "Resolve component: Map changed files to changelog folder"
    - "Calculate version: Scan existing files, determine next version"
    - "Generate content: Format per established template"
    - "Validate: Check format, version sequencing, completeness"
    - "Write: Create file in correct location"

  pre_change_validation:
    items:
      - "Source identified? (spec folder, component, or git history)"
      - "Component folder resolved?"
      - "Version number calculated?"
      - "Content generated with all required sections?"
      - "Confidence >=80%? (if not: ask)"
    stop_conditions: ["Any item unchecked", "Component unresolved"]
    stop_action: "STOP and address before proceeding"

# ─────────────────────────────────────────────────────────────────
# USER INPUTS (From Setup Phase outputs)
# ─────────────────────────────────────────────────────────────────
user_inputs:
  source_type: |
    [SOURCE_TYPE]
    One of: spec_folder, component, git_history
    FROM UNIFIED SETUP PHASE (Q0 or $ARGUMENTS).

  spec_folder: |
    [SPEC_FOLDER]
    Path to spec folder (if source_type = spec_folder).
    FROM UNIFIED SETUP PHASE (Q0 choice A).

  component_hint: |
    [COMPONENT_HINT]
    Component name hint (if source_type = component).
    FROM UNIFIED SETUP PHASE (Q0 choice B).

  version_bump: |
    [VERSION_BUMP]
    One of: major, minor, patch, build, auto
    FROM UNIFIED SETUP PHASE (--bump flag or Q1).

# ─────────────────────────────────────────────────────────────────
# FIELD HANDLING
# ─────────────────────────────────────────────────────────────────
field_handling:
  source_type:
    validation: "must be one of: spec_folder, component, git_history"
    required: true

  version_bump:
    validation: "must be one of: major, minor, patch, build, auto"
    default: "auto"

  defaults:
    changelog_root: ".opencode/changelog/"
    date_format: "YYYY-MM-DD"
    version_format: "v{MAJOR}.{MINOR}.{PATCH}.{BUILD}"
    initial_version: "v1.0.0.0"
    project_url: "https://github.com/MichelKerkmeester/opencode--spec-kit-skilled-agent-orchestration"

input_contract:
  required:
    - write_agent_verified
    - source_type
  optional:
    - spec_folder
    - component_hint
    - version_bump

# ─────────────────────────────────────────────────────────────────
# DOCUMENTATION LEVEL
# ─────────────────────────────────────────────────────────────────
documentation_level:
  default: "Level 1 (Baseline)"
  required_files:
    - spec.md
    - plan.md
    - tasks.md
  note: "Changelog creation is typically Level 1 unless multi-component"

# ─────────────────────────────────────────────────────────────────
# COMPONENT MAPPING TABLE
# ─────────────────────────────────────────────────────────────────
# Maps file path patterns to changelog component folders.
# Ordered by specificity (most specific first).
# When a changed file matches multiple patterns, use the FIRST match.
# ─────────────────────────────────────────────────────────────────
component_mapping:
  # ─────────────────────────────────────────────────────────────────
  # DYNAMIC DISCOVERY — scan .opencode/changelog/ at runtime
  # ─────────────────────────────────────────────────────────────────
  # Component folders are NOT hardcoded. The workflow discovers them:
  #
  #   $ ls -d .opencode/changelog/*/
  #
  # Folder naming convention: NN--component-name (zero-padded index)
  # Example: 04--commands, 11--sk-doc, 00--opencode-environment
  #
  # RESOLUTION STRATEGY (most specific first):
  #   1. Extract component name from folder (strip NN-- prefix)
  #   2. Match changed file paths against component names:
  #      - .opencode/skill/{name}/**  → folder containing {name}
  #      - .opencode/command/**       → folder containing "commands"
  #      - .opencode/agent/**         → folder containing "agents"
  #   3. Match component_hint keyword against folder names
  #   4. Fallback: first folder starting with "00--" (umbrella/cross-component)
  #
  # The agent MUST run the discovery scan in Step 2 of the workflow
  # and build the mapping dynamically from the actual folder contents.
  # ─────────────────────────────────────────────────────────────────

  discovery:
    scan_command: "ls -d .opencode/changelog/*/ 2>/dev/null | sort"
    folder_pattern: "^(\\d+)--(.*)"
    fallback_prefix: "00--"
    note: "Always use the first 00-- folder as default for unmatched paths"

  resolution_rules:
    - source: "file_path"
      strategy: "Match changed file paths against discovered folder names using substring/keyword matching"
    - source: "component_hint"
      strategy: "Match user-provided hint against discovered folder names"
    - source: "spec_folder"
      strategy: "Extract spec path segments and match against discovered folder names"
    - source: "fallback"
      strategy: "Use the 00-- prefixed folder (umbrella/cross-component)"

# ─────────────────────────────────────────────────────────────────
# VERSION BUMP RULES
# ─────────────────────────────────────────────────────────────────
version_bump_rules:
  auto_detection:
    major:
      triggers: ["BREAKING", "overhaul", "rewrite", "migration", "v2", "v3"]
      description: "Architectural overhaul or platform-level change"
    minor:
      triggers: ["feat", "add", "new", "feature", "implement", "create"]
      description: "Significant new feature or subsystem addition"
    patch:
      triggers:
        [
          "fix",
          "bug",
          "refactor",
          "chore",
          "docs",
          "update",
          "improve",
          "cleanup",
        ]
      description: "Incremental improvement, bug fix, or refactor"
    build:
      triggers: ["hotfix", "typo", "same-day"]
      description: "Hotfix on already-published version"

  detection_order:
    - "Check user-provided --bump flag first (highest priority)"
    - "Check spec.md title and purpose for change type keywords"
    - "Check git commit messages for conventional commit prefixes"
    - "Default to patch if no clear signal"

  calculation:
    major: "{MAJOR+1}.0.0.0"
    minor: "{MAJOR}.{MINOR+1}.0.0"
    patch: "{MAJOR}.{MINOR}.{PATCH+1}.0"
    build: "{MAJOR}.{MINOR}.{PATCH}.{BUILD+1}"

# ─────────────────────────────────────────────────────────────────
# CHANGELOG CONTENT TEMPLATE
# ─────────────────────────────────────────────────────────────────
changelog_template:
  # ─────────────────────────────────────────────────────────────────
  # TEMPLATE FILE: .opencode/command/create/assets/changelog_template.md
  # ─────────────────────────────────────────────────────────────────
  # The canonical changelog and release notes template lives in:
  #   .opencode/command/create/assets/changelog_template.md
  #
  # It defines TWO formats:
  #   1. COMPACT — for releases with fewer than 10 changes
  #      Uses: ## What Changed → bullet points with bold labels
  #   2. EXPANDED — for releases with 10+ changes or major releases
  #      Uses: ### short headings → Problem/Fix paragraphs per item
  #
  # FORMAT SELECTION:
  #   - Count the changes in work_context
  #   - < 10 changes → use compact format
  #   - >= 10 changes or major release → use expanded format
  #
  # WRITING STYLE (from PUBLIC_RELEASE.md Section 7):
  #   - Plain English for a smart non-developer
  #   - Every fix: what was broken + what we did + why it matters
  #   - No jargon without parenthetical definition
  #   - Technical details in Files Changed table, not in descriptions
  #   - Expanded-format sub-headings stay short (2-5 words, not full sentences)
  #
  # Read the template file at Step 4 before generating content.
  # ─────────────────────────────────────────────────────────────────
  template_file: ".opencode/command/create/assets/changelog_template.md"
  style_reference: "PUBLIC_RELEASE.md Section 7"

# ─────────────────────────────────────────────────────────────────
# HIGHLIGHT CATEGORIES
# ─────────────────────────────────────────────────────────────────
highlight_categories:
  # Use plain category names from PUBLIC_RELEASE.md Section 7.2:
  search: "### Search"
  saving: "### Saving Memories"
  security: "### Security"
  documentation: "### Documentation"
  testing: "### Testing"
  commands: "### Commands"
  new_features: "### New Features"
  bug_fixes: "### Bug Fixes"
  architecture: "### Architecture"
  breaking: "### Breaking Changes"
  category_named: "### {name}"
  note: |
    Use plain category names from PUBLIC_RELEASE.md vocabulary.
    For expanded format: use short ### headings with Problem/Fix paragraphs.
    Read .opencode/command/create/assets/changelog_template.md for full format reference.

# ─────────────────────────────────────────────────────────────────
# WORKFLOW ENFORCEMENT
# ─────────────────────────────────────────────────────────────────
workflow_enforcement:
  mode: strict
  step_order: sequential_mandatory
  skip_allowed: false
  critical_steps:
    step_2_component_resolution:
      enforcement: "MUST resolve to a valid changelog subfolder"
      verification: "Folder exists at .opencode/changelog/{resolved_folder}/"
    step_3_version_determination:
      enforcement: "MUST calculate a sequential version number"
      verification: "No file with same version exists in target folder"
    step_5_quality_validation:
      enforcement: "MUST verify format compliance before writing"
      verification: "All required sections present in generated content"

# ─────────────────────────────────────────────────────────────────
# WORKFLOW
# ─────────────────────────────────────────────────────────────────
gate_logic:
  hard:
    H0_write_verified:
      description: "@write verification must have passed in Phase 0"
      fail_action: "STOP and return to the command setup phase"
    H1_required_fields:
      description: "Source context and resolution inputs must be present"
      fail_action: "STOP and collect missing inputs"
    H2_component_resolution:
      description: "A changelog component folder must resolve before writing"
      fail_action: "STOP and ask for a clearer source or component hint"
    H3_version_contract:
      description: "Version calculation and content format must be valid before write"
      fail_action: "Fix the version/content plan before continuing"
  soft:
    S1_auto_bump:
      description: "Auto-detected version bump may proceed with logged assumptions"
      fail_action: "Proceed with rationale"

workflow_overview:
  steps:
    - id: step_1_context_analysis
      purpose: "Resolve the work source and collect changelog context"
    - id: step_2_component_resolution
      purpose: "Map the work to the correct changelog component folder"
    - id: step_3_version_determination
      purpose: "Calculate the next version and release tier"
    - id: step_4_content_generation
      purpose: "Draft the changelog entry using the canonical format"
    - id: step_5_quality_validation
      purpose: "Validate structure, versioning, and completeness"
    - id: step_6_write_file
      purpose: "Write the changelog entry to the resolved component folder"
    - id: step_7_save_context
      purpose: "Persist spec context and emit completion status"

workflow:
  step_1_context_analysis:
    purpose: Detect what was worked on and gather work context
    activities:
      - "Determine source type from Setup Phase outputs"
      - |
        IF source_type = spec_folder:
          Read {spec_folder}/implementation-summary.md (primary source)
          Read {spec_folder}/tasks.md (completed tasks)
          Read {spec_folder}/spec.md (title, purpose, requirements)
          Extract: work_summary, files_changed, change_type, spec_level
          Detect output mode:
            - IF --nested flag present -> changelog_mode = nested
            - ELSE IF spec_folder is a phase child OR has direct child phase folders OR already has changelog/ -> changelog_mode = nested
            - ELSE -> changelog_mode = global
      - |
        IF source_type = component:
          Use component_hint to identify target folder
          Run: git log --oneline --since="7 days ago" -- {component_file_patterns}
          Extract: recent_commits, files_changed
          changelog_mode = global
      - |
        IF source_type = git_history:
          Run: git log --oneline --since="7 days ago"
          Run: git diff --stat HEAD~10
          Extract: recent_commits, files_changed, commit_messages
          changelog_mode = global
      - "Compile work_context object with: summary, files_changed[], change_type, source"
    outputs:
      - work_context: "Object containing summary, files, change type"
      - files_changed: "List of changed file paths"
      - change_type_hint: "Feature / fix / refactor / architecture"
      - changelog_mode: "global or nested"
    validation: context_gathered

  step_2_component_resolution:
    purpose: Resolve the correct output target for global or nested changelog mode
    activities:
      - |
        IF changelog_mode = nested:
          Run: node .opencode/skill/system-spec-kit/scripts/dist/spec-folder/nested-changelog.js {spec_folder} --json
          Read canonical templates:
            - .opencode/skill/system-spec-kit/templates/changelog/root.md
            - .opencode/skill/system-spec-kit/templates/changelog/phase.md
          Extract output_path and nested summary payload
          Skip component-folder mapping and versioned release rules
      - |
        IF changelog_mode = global:
        DISCOVER available changelog folders:
          $ ls -d .opencode/changelog/*/ 2>/dev/null | sort
          Parse folder names using NN--component-name pattern
          Build runtime component list from actual directory contents
      - |
        IF changelog_mode = global:
        FOR EACH file in files_changed:
          Match file path segments against discovered component names
          Record matched component folder
      - |
        Count matches per component:
          IF single component dominates (>60% of files) -> primary_component = that component
          IF multiple components roughly equal -> list all, pick primary by file count
          IF no matches -> default to first 00-- prefixed folder (umbrella/cross-component)
      - |
        IF source_type = spec_folder:
          Extract spec path segments and match against discovered folder names
          Use as tiebreaker when file analysis is ambiguous
      - |
        IF source_type = component:
          Match component_hint against discovered folder names (substring match)
          Direct resolution without file analysis
      - "Verify target folder exists: ls .opencode/changelog/{resolved_folder}/"
      - |
        IF changelog_mode = nested:
          Verify nested output path resolves inside the target packet changelog/ folder
      - |
        IF changelog_mode = global:
        IF target folder does not exist:
          STOP - Report: "Changelog folder not found: {resolved_folder}"
          Ask user to confirm or choose different target
    outputs:
      - primary_component: "Resolved changelog subfolder name"
      - secondary_components: "Other affected components (if cross-component)"
      - resolution_confidence: "Percentage confidence in mapping"
      - nested_output_path: "Packet-local output path when changelog_mode = nested"
    validation: component_resolved

  step_3_version_determination:
    purpose: Calculate the next version number for the changelog entry
    activities:
      - |
        IF changelog_mode = nested:
          Skip version calculation. Nested packet changelogs use deterministic packet-local filenames.
      - "List existing changelog files in target folder:"
      - "  Run: ls .opencode/changelog/{primary_component}/ | sort -V"
      - "Parse the latest version file: extract MAJOR.MINOR.PATCH.BUILD"
      - |
        Determine bump type:
          IF version_bump != "auto" -> use user-specified bump type
          IF version_bump == "auto":
            Check change_type_hint against version_bump_rules.auto_detection
            Check work_context.summary for trigger keywords
            Default to "patch" if no clear signal
      - "Calculate next version using version_bump_rules.calculation"
      - |
        Verify no collision:
          IF file v{next_version}.md already exists:
            Increment BUILD segment until unique
      - "Store: next_version, bump_type_used"
    outputs:
      - next_version: "Calculated version string (e.g., v2.1.0.0)"
      - bump_type_used: "major/minor/patch/build"
      - latest_existing_version: "Previous version for reference"
    validation: version_calculated

  step_4_content_generation:
    purpose: Generate changelog content following established format
    activities:
      - "Read the template: .opencode/command/create/assets/changelog_template.md"
      - "If changelog_mode = nested, read .opencode/skill/system-spec-kit/templates/changelog/root.md or phase.md instead"
      - "Set DATE to today's date in YYYY-MM-DD format"
      - |
        SELECT FORMAT based on change count and release type:
          IF change_count < 10 AND change_type != major -> COMPACT format
          IF change_count >= 10 OR change_type == major -> EXPANDED format
          See template file Section 4 (Format Selection Guide) for full rules
      - |
        Generate SUMMARY (both formats):
          IF source_type = spec_folder:
            Use spec.md title + implementation-summary.md first paragraph
          IF source_type = component or git_history:
            Synthesize from commit messages and changed files
          Keep to 1-3 sentences. Lead with WHY, not technical stats.
      - |
        Generate BODY using selected format:

          COMPACT FORMAT:
            ## What Changed
            ### {Category Name}
            - **{Name}** -- {What was broken}. {What we did}. {Why it matters}.

          EXPANDED FORMAT:
            ## {Category Name} ({count})
            ### {Short heading}
            **Problem:** {Plain English explanation for a smart non-developer}
            **Fix:** {Behavior change, not implementation details}

        Expanded-format heading rule:
          - Prefer 2-5 words
          - Make it easy to scan at a glance
          - Avoid packet IDs, numbering, and sentence-length headings unless truly required

        Pull content from:
          spec_folder: tasks.md completed items, implementation-summary.md sections
          component/git: commit messages grouped by type
          nested: generator payload from nested-changelog.js
      - |
        Generate FILES_CHANGED:
          COMPACT: Simple table with File | Action | Description
          EXPANDED: Collapsible <details> with Source/Tests/Documentation subsections
      - |
        Generate UPGRADE section:
          IF change_type = major -> "Review breaking changes before upgrading."
          ELSE -> "No migration required."
          Always list behavioral changes users should be aware of.
      - "Assemble full content per template format (compact or expanded)"
    outputs:
      - changelog_content: "Complete formatted changelog markdown"
      - section_count: "Number of highlight sections generated"
    validation: content_generated

  step_5_quality_validation:
    purpose: Verify the generated changelog meets format and quality standards
    activities:
      - |
        FORMAT CHECKS:
          [ ] H1 starts with "# v{VERSION}"
          [ ] Project backlink blockquote present
          [ ] Version + date header in correct format: ## [**{VERSION}**] - {DATE}
          [ ] Summary paragraph present (non-empty)
          [ ] At least one Highlights subsection
          [ ] Files Changed section present
          [ ] Upgrade section present
      - |
        VERSION CHECKS:
          [ ] Version is strictly greater than latest_existing_version
          [ ] Version follows 4-segment format (MAJOR.MINOR.PATCH.BUILD)
          [ ] No file with this version exists in target folder
      - |
        CONTENT CHECKS:
          [ ] Summary is concise (1-3 sentences)
          [ ] Each highlight item has bold name + description
          [ ] Files changed entries have valid paths
      - |
        IF any check fails:
          Log failed check(s)
          Auto-fix if possible (e.g., missing section -> add empty section)
          Re-validate after fix
    outputs:
      - validation_passed: "true/false"
      - checks_passed: "N/N total"
      - auto_fixes_applied: "List of automatic corrections"
    validation: quality_verified

  step_6_write_file:
    purpose: Write the changelog file to the correct location
    activities:
      - |
        IF changelog_mode = nested:
          Run: node .opencode/skill/system-spec-kit/scripts/dist/spec-folder/nested-changelog.js {spec_folder} --write
          Verify the written packet-local file matches nested_output_path
      - "Construct output path: .opencode/changelog/{primary_component}/v{next_version}.md"
      - "Write changelog_content to output path using Write tool"
      - "Verify file was created: Read the first 5 lines of the written file"
      - |
        IF secondary_components exist:
          Note: "This work also affects: {secondary_components}"
          Suggest: "Consider creating additional changelogs for: {list}"
    outputs:
      - output_path: "Full path to created changelog file"
      - file_verified: "true/false"
    validation: file_written

  step_7_save_context:
    purpose: Report completion and preserve context
    activities:
      - "Display completion report (see completion_report section)"
      - |
        IF spec_path exists (from Setup Phase or spec_folder source):
          Note: "Context should be saved to spec folder"
          Suggest: "/memory:save {spec_path}"
    outputs:
      - status: "OK or FAIL"
      - changelog_path: "Path to created file"
    validation: context_saved

# ─────────────────────────────────────────────────────────────────
# CIRCUIT BREAKER
# ─────────────────────────────────────────────────────────────────
circuit_breaker:
  enabled: true
  thresholds:
    failures: 3
    recovery_s: 60
    success_to_close: 1
  states:
    CLOSED: "normal operation"
    OPEN: "skip optional steps, complete with warnings"
    HALF_OPEN: "test single operation"

# ─────────────────────────────────────────────────────────────────
# QUALITY STANDARDS
# ─────────────────────────────────────────────────────────────────
quality_standards:
  format_compliance:
    minimum: "All required sections present"
    enforcement: "Step 5 validates before Step 6 writes"
  version_integrity:
    minimum: "Sequential, no duplicates"
    enforcement: "Step 3 validates before Step 4 generates"
  content_quality:
    minimum: "Summary + highlights + files changed"
    enforcement: "Step 5 verifies non-empty content sections"

# ─────────────────────────────────────────────────────────────────
# AUTONOMOUS EXECUTION
# ─────────────────────────────────────────────────────────────────
autonomous_execution:
  principle: "Execute all steps without user approval gates"
  self_validation: "Verify outputs at each step before proceeding"
  error_handling: "Auto-fix where possible, escalate on hard failures"
  pause_conditions:
    - "Confidence drops below 40%"
    - "Component resolution ambiguous (multiple equally likely)"
    - "Version calculation produces unexpected result"
    - "Generated content has empty required sections"

# ─────────────────────────────────────────────────────────────────
# COMPLETION REPORT
# ─────────────────────────────────────────────────────────────────
completion_report:
  template: |
    Changelog Created

    Component: {primary_component}
    Version: {next_version} ({bump_type_used} bump)
    File: {output_path}

    Summary: {summary_first_sentence}

    Sections: {section_count} highlight categories
    Files Tracked: {files_changed_count}

    STATUS=OK PATH={output_path}

  on_failure: |
    Changelog Creation Failed

    Error: {error_description}
    Step: {failed_step}
    Component: {primary_component} (if resolved)

    STATUS=FAIL ERROR="{error_message}"

# ─────────────────────────────────────────────────────────────────
# ERROR RECOVERY
# ─────────────────────────────────────────────────────────────────
error_recovery:
  no_spec_artifacts:
    action: "Fall back to git history analysis"
    fallback: "If no git history either, prompt user for manual input"

  component_ambiguous:
    action: "Use highest file-count component as primary"
    fallback: "Default to first 00-- prefixed folder (umbrella/cross-component)"

  version_conflict:
    action: "Increment BUILD segment until unique"
    fallback: "Ask user for manual version"

  empty_content:
    action: "Generate minimal changelog from available data"
    fallback: "Prompt user to provide summary and highlights"

  write_failure:
    action: "Check permissions, retry once"
    fallback: "Display content for manual save"

# ─────────────────────────────────────────────────────────────────
# TERMINATION
# ─────────────────────────────────────────────────────────────────
termination:
  after_step: 7
  message: "Changelog creation workflow complete."
  next_steps:
    - "Review the generated changelog at {output_path}"
    - "Create additional changelogs for secondary components if needed"
