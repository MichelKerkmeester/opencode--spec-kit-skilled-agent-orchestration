# ─────────────────────────────────────────────────────────────────
# OPENCODE CREATE: FEATURE CATALOG WORKFLOW (AUTO MODE)
# ─────────────────────────────────────────────────────────────────
# Mode: autonomous execution (no approval checkpoints)
# Entrypoint: /create:feature-catalog
# Operations: create | update
# ─────────────────────────────────────────────────────────────────
role: Feature Catalog Creator using sk-doc
purpose: Create or update rooted feature catalog packages with the shipped sk-doc contract
action: Normalize inputs, load standards, generate the package, validate structure, and report completion

# ─────────────────────────────────────────────────────────────────
# PREREQUISITE: @write AGENT VERIFICATION
# ─────────────────────────────────────────────────────────────────
# This workflow REQUIRES the @write agent for:
#   - Template-first generation
#   - sk-doc standards enforcement
#   - Root document validation
#
# PHASE 0 in the command markdown verifies @write agent BEFORE
# this YAML workflow loads. If you are executing this workflow,
# @write verification has already passed.
# ─────────────────────────────────────────────────────────────────

operating_mode:
  workflow: unified_6_step
  workflow_compliance: MANDATORY
  workflow_execution: autonomous
  approvals: none
  tracking: progressive_status_logging
  validation: continuous_self_validation
  supports_operations:
    - create
    - update

development_philosophy:
  principle: "One rooted catalog contract, one command entrypoint"
  approach: "Normalize -> Discover -> Scaffold -> Validate -> Report"
  mandate: "Prefer the shipped sk-doc package shape over ad-hoc catalog layouts"

runtime_agent_path_resolution:
  default: .opencode/agent
  claude: .claude/agents
  codex: .codex/agents
  gemini: .gemini/agents

confidence_framework:
  thresholds:
    high: { range: "80-100%", action: "Proceed with deterministic defaults" }
    medium: { range: "40-79%", action: "Proceed with caution and log assumptions" }
    low: { range: "0-39%", action: "STOP and request clarification" }
  scoring_weights:
    input_completeness: 0.30
    routing_clarity: 0.20
    contract_alignment: 0.30
    validation_readiness: 0.20
  low_confidence_behavior:
    action: "Stop before generation and ask one consolidated clarification"

request_analysis_framework:
  code_search_note: "Use CocoIndex (mcp__cocoindex_code__search) for discovering existing patterns before creating. Use Grep only for exact known tokens."
  solution_flow:
    - "Parse command arguments and normalize execution mode"
    - "Verify create/update semantics against the real target path"
    - "Load the creation reference and both templates before writing"
    - "Derive category and feature inventory from the selected source strategy"
    - "Generate the rooted catalog package using current-reality content"
    - "Validate root structure, linked files, and count consistency"
  pre_change_validation:
    items:
      - "write_agent_verified is true"
      - "skill_name is present"
      - "operation is create or update"
      - "source_strategy is present"
      - "execution_mode is :auto"
    stop_conditions:
      - "Any required input missing"
      - "Operation does not match real target existence"
    stop_action: "STOP and correct setup before generation"

input_contract:
  required:
    - write_agent_verified
    - skill_name
    - operation
    - source_strategy
    - execution_mode
  optional:
    - skill_path
    - spec_choice
    - spec_path
    - memory_choice

field_handling:
  skill_name:
    validation: "hyphen-case folder name"
    required: true
  operation:
    validation: "must be one of: create, update"
    required: true
  source_strategy:
    validation: "must be one of: derive-playbook, manual-inventory, hybrid"
    required: true
  execution_mode:
    validation: "must be :auto"
    required: true

documentation_level:
  default: "Level 2 (Verification)"
  required_files:
    - spec.md
    - plan.md
    - tasks.md
    - checklist.md
  note: "Feature catalog package creation typically needs verification because it spans root and per-feature docs"

defaults:
  skill_path: .opencode/skill/
  catalog_dirname: feature_catalog
  execution_mode: :auto
  dqi_hard_minimum: 75

operation_router:
  create:
    requires_existing_catalog: false
    output_scope:
      - feature_catalog/feature_catalog.md
      - feature_catalog/NN--category-name/
      - feature_catalog/NN--category-name/NN-feature-name.md
  update:
    requires_existing_catalog: true
    output_scope:
      - feature_catalog/feature_catalog.md
      - feature_catalog/NN--category-name/
      - feature_catalog/NN--category-name/NN-feature-name.md

reference_sources:
  specific_creation: .opencode/skill/sk-doc/references/specific/feature_catalog_creation.md
  core_standards: .opencode/skill/sk-doc/references/global/core_standards.md
  validation: .opencode/skill/sk-doc/references/global/validation.md

template_sources:
  root_catalog: .opencode/skill/sk-doc/assets/documentation/feature_catalog/feature_catalog_template.md
  feature_file: .opencode/skill/sk-doc/assets/documentation/feature_catalog/feature_catalog_snippet_template.md

validation_scripts:
  validate_document: .opencode/skill/sk-doc/scripts/validate_document.py
  extract_structure: .opencode/skill/sk-doc/scripts/extract_structure.py

quality_standards:
  template_first: required
  frontmatter_required: true
  root_requirements:
    - unnumbered TABLE OF CONTENTS
    - numbered all-caps H2 sections
    - section 1 is OVERVIEW
  feature_file_requirements:
    - frontmatter
    - OVERVIEW
    - CURRENT REALITY
    - SOURCE FILES
    - SOURCE METADATA
  current_reality_rule: "Describe shipped behavior, not speculative roadmap content"
  validation_pipeline:
    - "python3 .opencode/skill/sk-doc/scripts/validate_document.py [catalog_root]/feature_catalog.md"
    - "python3 .opencode/skill/sk-doc/scripts/extract_structure.py [catalog_root]/feature_catalog.md"

gate_logic:
  hard:
    H0_write_verified:
      description: "write_agent_verified must be true"
      fail_action: "STOP and return to setup"
    H1_required_fields:
      description: "All required setup fields must be present"
      fail_action: "STOP and collect missing fields"
    H2_existence_semantics:
      description: "create/update must match real catalog existence"
      fail_action: "STOP and reroute or correct target"
    H3_contract_shape:
      description: "Generated package must match rooted feature catalog contract"
      fail_action: "Fix structure before continuing"
    H4_validation_gate:
      description: "Root validation and link/count checks must pass"
      fail_action: "Run fix-and-revalidate loop"
  soft:
    S1_source_strategy:
      description: "Prefer deriving from an existing playbook when present"
      fail_action: "Proceed with logged assumption"

workflow_overview:
  steps:
    - id: step_1_preflight
      purpose: "Normalize inputs and enforce H0-H2"
    - id: step_2_source_discovery
      purpose: "Resolve inventory sources and category taxonomy"
    - id: step_3_template_loading
      purpose: "Load references and both root/per-feature templates"
    - id: step_4_package_generation
      purpose: "Create or update rooted catalog artifacts"
    - id: step_5_validation
      purpose: "Run root validation and path/link consistency checks"
    - id: step_6_completion
      purpose: "Emit deterministic completion report"

workflow:
  step_1_preflight:
    purpose: Normalize and verify required fields
    activities:
      - Normalize skill_path to default when omitted
      - Derive catalog_root as "[skill_path]/[skill_name]/feature_catalog"
      - Validate operation token to supported value
      - Validate execution_mode is :auto
      - Check whether target root exists
    outputs:
      - normalized_inputs
      - target_existence_state

  step_2_source_discovery:
    purpose: Resolve source strategy and inventory inputs
    activities:
      - If source_strategy prefers playbook, inspect "[skill_path]/[skill_name]/manual_testing_playbook/"
      - Otherwise inspect current README/docs and operator-provided inventory
      - Build provisional category list and feature entry list
      - Preserve stable names and slugs if update mode
    outputs:
      - category_plan
      - feature_entry_plan

  step_3_template_loading:
    purpose: Load standards and templates before generation
    activities:
      - Read feature_catalog_creation.md
      - Read feature_catalog_template.md
      - Read feature_catalog_snippet_template.md
      - Extract the canonical root and feature-file section contracts
    outputs:
      - template_contract_loaded

  step_4_package_generation:
    purpose: Generate or update rooted catalog package
    activities:
      - Ensure catalog_root exists
      - Create or update feature_catalog.md
      - Create or update numbered category folders
      - Create or update one per-feature file per feature entry
      - Keep root summaries concise and route detail into per-feature files
    outputs:
      - generated_root_catalog
      - generated_category_dirs
      - generated_feature_files

  step_5_validation:
    purpose: Verify generated package
    activities:
      - Run validate_document.py on feature_catalog.md
      - Check that each root-linked feature file exists
      - Check category folder names follow NN--category-name
      - Check per-feature files contain required section headers
      - Check root entry count matches per-feature file count
    outputs:
      - root_validation_passed
      - consistency_checks_passed

  step_6_completion:
    purpose: Emit completion status
    activities:
      - Summarize operation, source strategy, and generated paths
      - Report validation results
      - Return STATUS=OK PATH=[catalog_root]
    outputs:
      - completion_report

error_recovery:
  missing_catalog_on_update:
    action: "Stop and recommend reroute to create"
  existing_catalog_on_create:
    action: "Stop and recommend reroute to update"
  missing_feature_file_template:
    action: "Stop because the per-feature contract cannot be enforced"
  root_validation_failure:
    action: "Enter fix-and-revalidate loop"

circuit_breaker:
  trigger_threshold: 3
  reset_condition: "Root validation passes and all linked paths resolve"
  actions:
    - "Stop autonomous generation"
    - "Report the failing gate and affected path"
    - "Return STATUS=FAIL with next-step guidance"

autonomous_execution:
  principle: "Advance automatically once hard gates pass"
  status_reporting:
    cadence: "Report at major workflow boundaries"
    include:
      - operation
      - source_strategy
      - target_path
      - validation_state

completion_report_template: |
  Feature Catalog Command Complete

  Skill: [skill_name]
  Operation: [operation]
  Source strategy: [source_strategy]
  Mode: :auto
  Target: [catalog_root]

  Validation:
  - Root validation: [passed/failed]
  - Root/per-feature link checks: [passed/failed]
  - Category/per-feature count checks: [passed/failed]

  STATUS=[OK|FAIL] PATH=[catalog_root]

termination:
  success_signal: "STATUS=OK PATH=[catalog_root]"
  failure_signal: "STATUS=FAIL PATH=[catalog_root]"
  rule: "Do not claim completion until validation output is included"

rules:
  must:
    - "Load the creation reference and both templates before writing"
    - "Keep the root file as a directory/index, not a full monolith"
    - "Use root-level numbered category folders"
  must_not:
    - "Invent speculative features"
    - "Collapse all feature detail back into the root file"
    - "Use deprecated folder layouts"
