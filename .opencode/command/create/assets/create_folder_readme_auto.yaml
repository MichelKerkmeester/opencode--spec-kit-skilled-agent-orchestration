# ════════════════════════════════════════════════════════════════
# SHARED: ERROR RECOVERY
# ════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────
# ERROR RECOVERY (Combined — README + Install Guide)
# ─────────────────────────────────────────────────────────────────
error_recovery:
  # ── README-specific recovery ──────────────────────────────────
  template_not_found:
    operation: readme
    action: "Check template paths, verify sk-doc skill exists"
    fallback: "Use inline minimal template structure"
  path_not_exist:
    operation: readme
    action: "Create directory or choose different path"
    options: ["Create directory", "Choose different path", "Cancel"]
  readme_exists:
    operation: readme
    action: "Offer update, backup, or new location"
    options: ["Overwrite", "Backup and overwrite", "Merge", "Cancel"]
  no_project_info:
    operation: readme
    action: "Prompt for manual input"
    questions: ["Project name?", "Key features?", "Target audience?"]
  user_rejects_approach:
    operation: readme
    action: "Return to planning, gather alternative requirements"
    restart_from: "step_2_content_discovery"

  # ── Install-guide-specific recovery ───────────────────────────
  unknown_project_type:
    operation: install_guide
    action: "Ask for project documentation/repo"
    options: [ "Provide documentation", "Describe project", "Cancel" ]
  missing_platform_info:
    operation: install_guide
    action: "Default to common platforms (macos, linux)"
    options: [ "Use defaults", "Specify platforms", "All platforms" ]
  unverifiable_commands:
    operation: install_guide
    action: "Add [unverified] notes"
    options: [ "Mark as unverified", "Test manually", "Skip" ]
  no_package_file:
    operation: install_guide
    action: "Ask user for dependencies manually"
    questions: [ "What runtime is needed?", "What dependencies?", "What APIs?" ]

  # ── Shared recovery ──────────────────────────────────────────
  validation_failure:
    operation: both
    action: "Show specific validation errors, guide fixes"
    retry: true
  file_write_failure:
    operation: both
    action: "Check permissions, verify path exists, create parent directories"
    retry: true
  validation_fails:
    operation: both
    action: "Show which sections need content, guide fixes"
    loop: true

# ─────────────────────────────────────────────────────────────────
# TERMINATION (Combined — README + Install Guide)
# ─────────────────────────────────────────────────────────────────
termination:
  after_step: step_6_save_context
  message:
    readme: "README creation workflow complete."
    install_guide: "Installation guide creation workflow complete."
  next_steps:
