# ─────────────────────────────────────────────────────────────────
# RULES (Combined — README + Install Guide)
# ─────────────────────────────────────────────────────────────────
rules:
  # ── Shared rules ─────────────────────────────────────────────
  ALWAYS:
  - "Self-validate at each step before proceeding"
  - "Load templates before creating content"
  - "Include Quick Start / AI-First section with clear examples"
  - "Create table of contents with proper anchor links"
  - "Use section formatting"
  - "Validate structure before claiming complete"
  - "Include troubleshooting section"
  NEVER:
  - "Prompt user for approval at checkpoints"
  - "Skip validation steps"
  - "Create documents without loading templates first"
  - "Leave placeholder text in final output"
  - "Create documentation without user-confirmed path/output"

  # ── README-specific rules ────────────────────────────────────
  readme_ALWAYS:
  - "Load readme_template.md before creating content"
  - "Include Quick Start section with clear examples"
  - "Create table of contents with proper anchor links"
  - "Validate structure before claiming complete"
  readme_NEVER:
  - "Omit troubleshooting section"
  - "Create README without user-confirmed path"

  # ── Install-guide-specific rules ─────────────────────────────
  install_guide_ALWAYS:
  - include_ai_first_section
  - include_all_11_sections
  - provide_quick_install_option
  - include_verification_commands
  - add_troubleshooting_section
  - include_platform_configurations
  - add_quick_reference_at_end
  - validate_before_claiming_complete
  install_guide_NEVER:
  - skip_ai_first_section
  - skip_platform_when_requested
  - leave_placeholders_unfilled
  - omit_version_requirements
  - use_untested_commands_without_warning
  - create_without_user_confirmed_output
