# ─────────────────────────────────────────────────────────────────
# SMART SPECKIT: RESUME WORKFLOW (INTERACTIVE MODE)
# ─────────────────────────────────────────────────────────────────
role: Expert Developer using Smart SpecKit for interactive session resume
purpose: Resume previous work session with user confirmation at each step
action: Detect session, confirm selection, load context, and present options

# ─────────────────────────────────────────────────────────────────
# OPERATING MODE
# ─────────────────────────────────────────────────────────────────
operating_mode:
  workflow: utility
  compliance: OPTIONAL
  execution: interactive
  approvals: step_by_step
  tracking: session_state_detection
  validation: checkpoint_based

resume_philosophy:
  principle: "Context continuity with user control and useful defaults"
  approach: "Detect, recover just enough state, then let the user deepen only if needed"

# ─────────────────────────────────────────────────────────────────
# USER INPUTS
# ─────────────────────────────────────────────────────────────────
user_inputs:
  spec_folder: "[SPEC_FOLDER] - Spec folder path. Leave empty to auto-detect from most recent memory."

# ─────────────────────────────────────────────────────────────────
# SESSION DETECTION
# ─────────────────────────────────────────────────────────────────
session_detection:
  priority_order: ["CLI argument", "Deterministic candidate ranking", "Semantic memory search", "Trigger phrase matching", "Most recent memory file by mtime"]
  note: "Stateless architecture - no .spec-active marker file used. Interactive mode confirms ambiguous ranked detections."
  deterministic_ranking:
    roots: ["specs/", ".opencode/specs/"]
    normalization: "Canonicalize alias roots before ranking (specs/ vs .opencode/specs/)"
    filters: ["archive", "test", "fixture", "scratch"]
    tie_breakers: ["artifact completeness", "recent activity", "stable path sort"]
    confidence_contract:
      high_confidence: "present top candidate for confirmation"
      low_confidence_interactive: "present top 3 ranked candidates and require explicit user selection"
  tier_details:
    tier_1_cli:
      method: "Parse $ARGUMENTS for spec folder path"
      priority: "highest"
    tier_1b_ranked_candidates:
      method: "Enumerate candidate folders from both roots, normalize aliases, filter non-active folders, rank deterministically"
      fallback: "tier_2"
    tier_2_semantic:
      method: "memory_list({ limit: 3, sortBy: 'updated_at' })"
      fallback: "tier_3"
    tier_3_triggers:
      method: "memory_match_triggers({ prompt: 'resume work session context' })"
      fallback: "tier_4"
    tier_4_mtime:
      method: "glob {.opencode/,}specs/**/memory/*.md | sort by mtime | head -1"
      fallback: "report no session"
  phase_folder_detection:
    trigger: "After spec folder resolved, check if it contains [0-9][0-9][0-9]-*/ child directories"
    action: "If phase children found → list them with per-child tasks.md completion status → present phase selection UI before proceeding"
    skip: "If --phase-folder was provided in $ARGUMENTS, skip detection and use the specified child directly"
    detection_method_value: "phase-folder"
  fallback: { on_no_memory: "Report no active session, suggest /spec_kit:complete" }

# ─────────────────────────────────────────────────────────────────
# CONTEXT LOADING
# ─────────────────────────────────────────────────────────────────
context_loading_priority:
  order: ["Primary: handover.md (<24h old)", "Primary: session_bootstrap() or memory_context(mode: resume, profile: resume)", "Secondary: CONTINUE_SESSION.md for crash recovery", "Secondary: memory_search() with resume anchors", "Secondary: checklist.md for progress"]
  note: "Try the primary recovery chain first, then let the user choose whether extra memory context is needed"

memory_loading:
  mode: interactive
  behavior: "Check handover.md (<24h) first, then run session_bootstrap() or memory_context() in resume mode with profile=resume and only ask for extra memory when the recovery packet is still missing something important"
  options:
    - { id: A, label: "Fast resume", description: "Just enough context to continue safely" }
    - { id: B, label: "Fill missing next step / blockers", description: "Target only the missing recovery gaps" }
    - { id: C, label: "Deep context", description: "Load up to 3 recent files for a fuller picture" }
    - { id: D, label: "Artifacts only", description: "Use tasks/checklist/handover without extra memory files" }
  mcp_integration:
    tool: memory_context
    note: "Call MCP tools directly - NEVER through Code Mode"
    parameters: { input: "resume previous work continue session", mode: "resume", profile: "resume", specFolder: "{spec_folder_path}", includeContent: true }

smart_memory_logic:
  objective: "Recover enough state to continue safely, then let the user choose whether to deepen context"
  essentials: ["current phase or task", "last confirmed action", "next safe action", "blockers or none", "relevant artifact or file"]
  sufficiency_rule: "Stop and present the resume brief once next safe action is known plus any two supporting essentials"
  gap_fill_order:
    - "If current phase or task is missing, inspect tasks.md/checklist.md/handover.md"
    - "If next safe action is missing, use session_bootstrap() or memory_context(mode: resume, profile: resume) then targeted memory_search on next-steps/state"
    - "If blockers are missing, target blockers/summary"
    - "If a concrete starting point is missing, use tasks.md or implementation-summary.md before loading more memory"
    - "If ambiguity remains, show the uncertainty and ask the user which direction to investigate"

checkpoint_options:
  session_selection:
    - { label: "Confirm", description: "This is the correct spec folder" }
    - { label: "Select Different", description: "Choose a different spec folder" }
    - { label: "Cancel", description: "Cancel resume operation" }
  continuation:
    - { label: "Continue from pending work", description: "Pick up where you left off" }
    - { label: "Run /spec_kit:implement", description: "Execute remaining tasks" }
    - { label: "Just chat", description: "Work on it manually" }

stale_session_detection:
  check: "last_modified > 7 days"
  interactive_behavior:
    options:
      - { label: "Resume anyway", description: "Load context and continue" }
      - { label: "Fresh start", description: "Keep artifacts, restart workflow" }
      - { label: "Review first", description: "Show what changed in codebase" }
      - { label: "Cancel", description: "Do not resume" }

# ─────────────────────────────────────────────────────────────────
# CONFIDENCE & CLARIFICATION FRAMEWORK
# ─────────────────────────────────────────────────────────────────
confidence_framework:
  thresholds:
    high: { range: "80-100%", action: "Proceed with context loading and resume" }
    medium: { range: "40-79%", action: "Proceed with caution - present stale session options" }
    low: { range: "0-39%", action: "STOP - Ask user about context reliability and avoid guessing the next step" }
  scoring_weights: { session_recency: 0.40, artifact_completeness: 0.30, memory_availability: 0.20, codebase_changes: 0.10 }
  reply_format: ["Confidence: NN%", "Context source: handover|memory", "Now", "Last confirmed", "Next safe action"]
  escalation: { timebox_minutes: 5, failed_threshold: 2, action: "Present options to user with current findings" }

# ─────────────────────────────────────────────────────────────────
# WORKFLOW
# ─────────────────────────────────────────────────────────────────
workflow:
  step_1_session_detection:
    purpose: Detect active session from CLI argument or memory files
    activities:
      - Check CLI argument for spec folder
      - If no argument, build deterministic candidates from `specs/` and `.opencode/specs/`
      - Canonicalize aliases and filter archive/test/fixture/scratch paths
      - Rank candidates deterministically with stable tie-breakers
      - If low confidence, present top-ranked candidates for explicit selection
      - If no ranked candidate, continue to semantic/memory fallback
      - Validate resolved spec folder exists
    outputs: { spec_folder: detected_path, detection_method: argument_or_memory }
    validation: session_detected
    checkpoint:
      question: "Found session. Is this the correct spec folder?"
      options:
        - { label: "Confirm", description: "This is the correct spec folder" }
        - { label: "Select Different", description: "Choose a different spec folder" }
        - { label: "Cancel", description: "Cancel resume operation" }

  step_2_memory_selection:
    purpose: Recover the default resume packet first, then let the user deepen only where the packet is still weak
    activities:
      - Check for handover.md in spec_folder (<24h old)
      - If recent handover exists, load and display contents
      - Attempt session_bootstrap() or memory_context() with mode="resume" and profile="resume" for the resolved spec folder
      - Extract Resume Essentials (current phase/task, last confirmed action, next safe action, blockers, relevant artifact/file)
      - If essentials are still missing, inspect CONTINUE_SESSION.md when present and recent
      - Present targeted depth options instead of raw file-loading choices
      - Present numbered options to user, wait for selection
    context_priority: ["handover.md", "session_bootstrap()", "memory_context(mode: resume, profile: resume)", "CONTINUE_SESSION.md", "memory/*.md (supplemental)"]
    outputs: { handover_loaded: "true|false", primary_recovery_loaded: "true|false", selected_memory: user_choice, load_count: number }
    checkpoint:
      question: "Do you want more context, or is the resume brief already enough?"
      note: "Prefer the smallest context packet that makes the next action clear"
      options:
        - { label: "A) Fast resume", description: "Current resume brief is enough" }
        - { label: "B) Fill missing next step / blockers", description: "Target only the missing recovery gaps" }
        - { label: "C) Deep context", description: "Load up to 3 recent files for a fuller picture" }
        - { label: "D) Artifacts only", description: "Continue with the current artifacts and no extra memory files" }

  step_3_load_memory:
    purpose: Fill specific recovery gaps instead of broad-loading memory by default
    activities:
      - If the user chose Fast resume, keep the current recovery packet and do not load more
      - If the user chose Fill missing next step / blockers, run targeted anchored memory_search() only for those gaps
      - If the user chose Deep context, load up to 3 recent memory files
      - If the user chose Artifacts only, rely on tasks.md/checklist.md/handover.md and skip supplemental memory
      - Merge supplemental results with handover and primary recovery context
      - Extract Project State Snapshot (Phase, Active File, Last confirmed action, Next safe action, Blockers)
      - Parse and summarize combined context
    mcp_tool:
      name: memory_context
      note: "Call directly - NEVER through Code Mode. Use resume mode first; use anchored memory_search() only when more detail is still needed."
      parameters: { input: "resume previous work continue session", mode: "resume", profile: "resume", specFolder: "{detected_spec_folder}", includeContent: true }
    outputs: { memory_loaded: true, context_source: "handover|memory_context|continue_session|memory|combined", context_summary: extracted_context, resume_packet: "now|last|next|blockers|artifact" }
    validation: context_loaded

  step_4_calculate_progress:
    purpose: Calculate task and checklist progress
    activities: [Parse tasks.md for completion status, Parse checklist.md for verification status, Calculate percentages, Identify pending items]
    outputs: { tasks_progress: percentage, checklist_progress: percentage, pending_items: list }
    validation: progress_calculated

  step_5_present_resume:
    purpose: Display a concise resume brief and offer continuation options
    activities: [Display spec folder and last activity, Show progress bars, Show Now/Last confirmed/Next safe action/Blockers, Cite the artifact or task that justifies the recommendation, Present continuation options]
    outputs: { resume_summary: displayed }
    validation: resume_complete
    checkpoint:
      question: "Ready to continue. What would you like to do?"
      options:
        - { label: "Continue from pending work", description: "Pick up where you left off" }
        - { label: "Run /spec_kit:implement", description: "Execute remaining tasks" }
        - { label: "Just chat", description: "Work on it manually" }

stale_session:
  threshold_days: 7
  detection: { check: "last_modified > 7 days", action: "Present warning and options" }
  interactive_behavior:
    options:
      - { label: "Resume anyway", description: "Load context and continue" }
      - { label: "Fresh start", description: "Keep artifacts, restart workflow" }
      - { label: "Review first", description: "Show what changed" }
      - { label: "Cancel", description: "Do not resume" }

# ─────────────────────────────────────────────────────────────────
# WORKFLOW TERMINATION
# ─────────────────────────────────────────────────────────────────
termination:
  after_step: 5
  message: "Session resume complete. Ready to continue work."
  next_steps:
    - "Continue from pending work"
    - "Review implementation summary"
    - "Run /spec_kit:implement if tasks remain"

# ─────────────────────────────────────────────────────────────────
# INTERACTIVE EXECUTION GUIDANCE
# ─────────────────────────────────────────────────────────────────
interactive_execution:
  principle: "Execute resume with user approval at each checkpoint"
  checkpoint_behavior: [Complete step activities, Present results summary, Present options for selection, Wait for response, Process feedback, Proceed or redirect as directed]
  user_feedback_handling: { confirm: "Proceed to next step", select_different: "Show folder selection options", skip: "Proceed without loading memory", cancel: "Abort resume operation" }

crash_recovery:
  command_reference: "/spec_kit:resume"
  description: "Crash recovery is handled inside the resume workflow through handover, resume-mode memory retrieval, crash breadcrumbs, and anchored search fallbacks"
  when_to_use: ["Session interrupted unexpectedly", "Context compaction detected", "Need to recover without handover.md"]
  integration_with_resume:
    relationship: "/spec_kit:resume = standard continuation + interrupted-session recovery"
    recommendation: "Use /spec_kit:resume for both ordinary continuation and crash recovery"

# ─────────────────────────────────────────────────────────────────
# ERROR RECOVERY
# ─────────────────────────────────────────────────────────────────
error_recovery:
  no_active_session: "Report no session, suggest /spec_kit:complete"
  spec_folder_missing: "Report not found, ask user to specify or create"
  memory_search_failed: { action: "Report that supplemental anchored recovery failed", fallback: "Offer to continue with the current /spec_kit:resume context or start fresh" }
  stale_session_detected: "Present stale session options to user"
  user_cancels: "Acknowledge cancellation, exit gracefully"
  crash_detected: "Continue with the built-in resume recovery chain"
  insufficient_context: "Show what is known, call out what is still unclear, and ask which missing area to investigate"

# ─────────────────────────────────────────────────────────────────
# RULES
# ─────────────────────────────────────────────────────────────────
rules:
  ALWAYS:
  - detect_session_before_loading
  - confirm_spec_folder_with_user
  - present_memory_options
  - calculate_progress_from_artifacts
  - display_clear_summary
  - use_mcp_tools_directly
  - respect_user_selections
  - stop_loading_when_context_is_sufficient
  - recommend_one_safe_next_action
  NEVER:
  - auto_load_without_confirmation
  - proceed_without_user_approval
  - proceed_without_valid_spec_folder
  - call_mcp_through_code_mode
  - ignore_user_cancellation
  - dump_extra_memory_when_the_next_step_is_already_clear
  - guess_missing_state_when_confidence_is_low
