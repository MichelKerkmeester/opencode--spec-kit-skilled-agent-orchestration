# Reconciled on 2026-04-08 during the deep-review remediation cycle.
# Phase 5 operational alerts for the PR-9 save-quality telemetry surface.
# Thresholds reflect the current scalar metrics emitted by the implementation and are cross-referenced by telemetry-catalog.md.
groups:
  - name: memory-save-quality
    rules:
      - alert: MemorySaveTierDriftPage
        expr: memory_save_frontmatter_tier_drift_total > 0
        for: 15m
        labels:
          severity: page
          metric: M4
        annotations:
          summary: "Memory save tier drift detected"
          description: "D4 should stay at zero after the Phase 2 and Phase 4 fixes."

      - alert: MemorySaveHighSeverityReviewPage
        expr: memory_save_review_violation_total{check_id=~"D1|D2|D4|D7",severity="HIGH"} > 0
        for: 15m
        labels:
          severity: page
          metric: M8
        annotations:
          summary: "High-severity save review regression detected"
          description: "Reviewer HIGH findings should page immediately for D1, D2, D4, or D7."

      - alert: MemorySaveGitProvenanceMissingWarn
        expr: memory_save_git_provenance_missing_total > 5
        for: 1h
        labels:
          severity: warn
          metric: M6
        annotations:
          summary: "Memory save git provenance degraded"
          description: "Warn when missing provenance exceeds five per hour in the operational window."

      - alert: MemorySaveOverviewBoundaryWarn
        expr: memory_save_overview_length_histogram > 0
        for: 30m
        labels:
          severity: warn
          metric: M1
        annotations:
          summary: "Memory save overview boundary bucket drift"
          description: "Current implementation warns on any non-zero overview-length sample for 30m; bucket-share alerting needs additional telemetry instrumentation."

      - alert: MemorySaveDurationP95Warn
        expr: memory_save_duration_seconds > 0.50
        for: 30m
        labels:
          severity: warn
          metric: M9
        annotations:
          summary: "Memory save duration p95 is above 500 ms"
          description: "Current implementation warns on any emitted duration sample above 0.50 seconds for 30m; p95 alerting needs histogram or quantile aggregation."

      - alert: MemorySaveContinuationAmbiguousWarn
        expr: memory_save_continuation_signal_hit_total > 0
        for: 1h
        labels:
          severity: warn
          metric: M5
        annotations:
          summary: "Continuation saves are landing without an unambiguous predecessor"
          description: "Current implementation warns on any continuation-pattern hit for 1h; ambiguity-ratio alerting needs explicit numerator and denominator telemetry."

      - alert: MemorySaveTemplateAnchorWarn
        expr: memory_save_template_anchor_violations_total > 0
        for: 15m
        labels:
          severity: warn
          metric: M7
        annotations:
          summary: "Template anchor mismatch detected"
          description: "D8 anchor mismatches should remain zero once the template fix is live."
