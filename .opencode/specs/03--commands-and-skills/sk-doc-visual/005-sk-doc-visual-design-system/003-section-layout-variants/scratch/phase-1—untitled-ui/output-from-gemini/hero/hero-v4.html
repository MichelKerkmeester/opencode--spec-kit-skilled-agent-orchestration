<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Hero — UntitledUI Variant 4 (Announcement + Search)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      /* BACKGROUNDS */
      --bg-primary: rgb(255 255 255);
      --bg-secondary: rgb(250 250 250);
      --bg-brand-primary: rgb(249 245 255);

      /* TEXT */
      --text-primary: rgb(24 29 39);
      --text-secondary: rgb(65 70 81);
      --text-brand-secondary: rgb(105 65 198);
      --text-brand-tertiary: rgb(127 86 217);

      /* FOREGROUND */
      --fg-quaternary: rgb(164 167 174);
      --fg-brand-primary: rgb(127 86 217);

      /* BORDERS */
      --border-primary: rgb(213 215 218);
      --border-secondary: rgb(233 234 235);
      --border-brand: rgb(158 119 237);

      /* TYPOGRAPHY */
      --font-body: 'Inter', system-ui, sans-serif;
      --font-display: 'Inter', system-ui, sans-serif;
      
      --text-sm: 0.875rem;
      --text-md: 1rem;
      --text-xl: 1.25rem;
      --display-xl: 3.75rem;

      --leading-sm: 1.25rem;
      --leading-md: 1.5rem;
      --leading-xl: 1.875rem;
      --leading-display-xl: 4.5rem;

      --font-medium: 500;
      --font-semibold: 600;
      --font-bold: 700;

      /* SPACING & RADIUS */
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-12: 3rem;
      --space-16: 4rem;
      --space-24: 6rem;

      --radius-sm: 0.25rem;
      --radius-lg: 0.5rem;
      --radius-full: 9999px;

      /* SHADOWS & FOCUS */
      --shadow-sm: 0px 1px 3px rgba(10, 13, 18, 0.1);
      --shadow-md: 0px 4px 6px -1px rgba(10, 13, 18, 0.1);
      --focus-ring: 0 0 0 4px rgb(244 235 255), 0 0 0 1px rgb(127 86 217);

      --container-max: 1280px;
      --container-padding: var(--space-8);
      --transition-normal: 200ms ease;
    }

    /* BASE */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); color: var(--text-primary); background: var(--bg-primary); }
    .page-container { max-width: var(--container-max); margin: 0 auto; padding: 0 var(--container-padding); }
    a { color: var(--text-brand-secondary); text-decoration: none; }
    svg { display: block; flex-shrink: 0; }

    /* COMPONENTS */
    .badge { display: inline-flex; align-items: center; border-radius: var(--radius-full); font-weight: var(--font-medium); padding: 2px var(--space-2); font-size: 0.75rem; }
    .badge--brand { background: rgb(252 250 255); color: var(--text-brand-secondary); box-shadow: inset 0 0 0 1px rgb(232 218 255); }

    /* SECTION SPECIFIC */
    .announcement-bar {
      background: var(--bg-brand-primary);
      padding: var(--space-3) var(--container-padding);
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-secondary);
    }

    .announcement-content {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      font-size: var(--text-sm);
      font-weight: var(--font-medium);
      color: var(--text-brand-secondary);
    }

    .announcement-close {
      cursor: pointer;
      color: var(--text-brand-secondary);
      background: transparent;
      border: none;
      padding: var(--space-1);
      border-radius: var(--radius-sm);
    }
    .announcement-close:hover { background: rgba(105, 65, 198, 0.1); }

    .hero-search-section {
      padding: var(--space-24) 0 var(--space-16) 0;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero-title {
      font-family: var(--font-display);
      font-size: var(--display-xl);
      line-height: var(--leading-display-xl);
      font-weight: var(--font-bold);
      color: var(--text-primary);
      margin-bottom: var(--space-6);
      letter-spacing: -0.02em;
      max-width: 900px;
    }

    .title-accent {
      color: var(--text-brand-secondary);
    }

    .hero-description {
      font-size: var(--text-xl);
      line-height: var(--leading-xl);
      color: var(--text-secondary);
      max-width: 640px;
      margin-bottom: var(--space-12);
    }

    .search-container {
      width: 100%;
      max-width: 640px;
      position: relative;
      margin-bottom: var(--space-24);
    }

    .search-input {
      width: 100%;
      padding: var(--space-4) var(--space-16) var(--space-4) var(--space-12);
      font-size: var(--text-md);
      font-family: var(--font-body);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-lg);
      background: var(--bg-primary);
      box-shadow: var(--shadow-sm);
      transition: box-shadow var(--transition-normal), border-color var(--transition-normal);
      color: var(--text-primary);
    }
    .search-input::placeholder { color: var(--fg-quaternary); }
    .search-input:focus { outline: none; box-shadow: var(--shadow-md), var(--focus-ring); border-color: var(--border-brand); }

    .search-icon {
      position: absolute;
      left: var(--space-4);
      top: 50%;
      transform: translateY(-50%);
      color: var(--fg-quaternary);
      pointer-events: none;
    }

    .search-kbd {
      position: absolute;
      right: var(--space-4);
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: var(--font-medium);
      color: var(--text-secondary);
      background: var(--bg-secondary);
      border: 1px solid var(--border-secondary);
      padding: 2px 6px;
      border-radius: var(--radius-sm);
      pointer-events: none;
    }

    .trust-section {
      border-top: 1px solid var(--border-secondary);
      padding-top: var(--space-8);
      width: 100%;
    }

    .trust-title {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      font-weight: var(--font-medium);
      margin-bottom: var(--space-6);
    }

    .trust-logos {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: var(--space-12);
      flex-wrap: wrap;
      color: var(--fg-quaternary);
    }
  </style>
</head>
<body>
  
  <header class="announcement-bar">
    <div style="width: 24px;"></div> <!-- Spacer for flex centering -->
    <div class="announcement-content">
      <span class="badge badge--brand">Update</span>
      <span>We've completely overhauled our search infrastructure. <a href="#" style="text-decoration: underline;">Read the changelog</a></span>
    </div>
    <button class="announcement-close" aria-label="Dismiss">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    </button>
  </header>

  <div class="page-container">
    <section class="hero-search-section">
      
      <h1 class="hero-title">Find exactly what you're <br><span class="title-accent">looking for</span></h1>
      
      <p class="hero-description">
        Search across our entire documentation library, API references, and community guides to get the answers you need in milliseconds.
      </p>

      <div class="search-container">
        <svg class="search-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" class="search-input" placeholder="Search documentation, components, tutorials...">
        <div class="search-kbd">⌘ K</div>
      </div>

      <div class="trust-section">
        <p class="trust-title">Trusted by engineering teams at</p>
        <div class="trust-logos">
          <!-- Abstract Logo 1 -->
          <svg width="120" height="32" viewBox="0 0 120 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 4L28 12V28L16 20L4 28V12L16 4Z" fill="currentColor" fill-opacity="0.2"/>
            <path d="M16 20L28 12M16 20V32M16 20L4 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <text x="36" y="22" font-family="Inter" font-weight="600" font-size="16" fill="currentColor">Layers</text>
          </svg>
          <!-- Abstract Logo 2 -->
          <svg width="120" height="32" viewBox="0 0 120 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="16" cy="16" r="12" stroke="currentColor" stroke-width="2" stroke-dasharray="4 4"/>
            <circle cx="16" cy="16" r="6" fill="currentColor"/>
            <text x="36" y="22" font-family="Inter" font-weight="600" font-size="16" fill="currentColor">Spherule</text>
          </svg>
          <!-- Abstract Logo 3 -->
          <svg width="120" height="32" viewBox="0 0 120 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="8" width="24" height="16" rx="4" stroke="currentColor" stroke-width="2"/>
            <path d="M10 16H22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <text x="36" y="22" font-family="Inter" font-weight="600" font-size="16" fill="currentColor">Catalog</text>
          </svg>
          <!-- Abstract Logo 4 -->
          <svg width="120" height="32" viewBox="0 0 120 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 24L12 8L16 16L20 8L28 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <text x="36" y="22" font-family="Inter" font-weight="600" font-size="16" fill="currentColor">Quotient</text>
          </svg>
        </div>
      </div>

    </section>
  </div>
</body>
</html>
