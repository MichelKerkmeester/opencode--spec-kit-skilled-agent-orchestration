      --space-48: 12rem;

      --shadow-md: 0px 4px 6px -1px rgba(10, 13, 18, 0.1), 0px 2px 4px -2px rgba(10, 13, 18, 0.06);
      --shadow-lg: 0px 12px 16px -4px rgba(10, 13, 18, 0.08), 0px 4px 6px -2px rgba(10, 13, 18, 0.03);
      --shadow-xl: 0px 20px 24px -4px rgba(10, 13, 18, 0.08), 0px 8px 8px -4px rgba(10, 13, 18, 0.03);
      --shadow-2xl: 0px 24px 48px -12px rgba(10, 13, 18, 0.18);
      --shadow-3xl: 0px 32px 64px -12px rgba(10, 13, 18, 0.24);
      --shadow-skeumorphic: 0px 0px 0px 1px rgba(10, 13, 18, 0.18) inset, 0px -2px 0px rgba(10, 13, 18, 0.05) inset;

      --focus-ring: 0 0 0 4px var(--brand-100), 0 0 0 1px var(--brand-600);
      --focus-ring-error: 0 0 0 4px var(--error-100), 0 0 0 1px var(--error-600);

      --container-max: 1280px;

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body {
      font-family: var(--font-body);
      font-size: var(--text-md);
      line-height: var(--leading-md);
      color: var(--text-primary);
      background: var(--bg-primary);
    }

    .page-container {
      max-width: var(--container-max);
      margin: 0 auto;
      padding: 0 var(--container-padding);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    svg {
      display: block;
      flex-shrink: 0;
    }

    /* COMPONENT: Badge Pill */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      border-radius: var(--radius-full);
      font-family: var(--font-body);
      font-weight: var(--font-medium);
      white-space: nowrap;
    }
    .badge--sm {
      padding: 2px var(--space-2);
      font-size: var(--text-xs);
      line-height: var(--leading-xs);
    }
    .badge--brand {
      background: var(--utility-brand-50);
      color: var(--utility-brand-700);
      box-shadow: inset 0 0 0 1px var(--utility-brand-200);
    }
    .badge--gray {
      background: var(--utility-gray-50);
      color: var(--utility-gray-700);
      box-shadow: inset 0 0 0 1px var(--utility-gray-200);
    }

    /* COMPONENT: Button */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
      font-weight: var(--font-semibold);
      text-decoration: none;
      transition: background var(--transition-fast), box-shadow var(--transition-fast);
      position: relative;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 1px solid rgba(255, 255, 255, 0.12);
      pointer-events: none;
    }
    .btn--md {
      padding: var(--space-2-5) var(--space-4);
      font-size: var(--text-sm);
      line-height: var(--leading-sm);
      border-radius: var(--radius-lg);
    }
    .btn--primary {
      background: var(--bg-brand-solid);
      color: var(--text-white);
      box-shadow: var(--shadow-xs), var(--shadow-skeumorphic);
    }
    .btn--primary:hover {
      background: var(--bg-brand-solid-hover);
    }
    .btn--secondary {
      background: var(--bg-primary);
      color: var(--text-secondary);
      box-shadow: var(--shadow-xs);
      border: 1px solid var(--border-primary);
    }
    .btn--secondary::before {
      display: none;
    }
    .btn--secondary:hover {
      background: var(--bg-primary-hover);
      color: var(--text-primary);
    }

    /* === SECTION-SPECIFIC STYLES === */
    .section-spacing {
      padding-top: var(--space-24);
      padding-bottom: var(--space-24);
    }

    .section-header {
      text-align: center;
      margin-bottom: var(--space-16);
    }

    .section-title {
      font-family: var(--font-display);
      font-size: var(--display-md);
      line-height: var(--leading-display-md);
      font-weight: var(--font-semibold);
      color: var(--text-primary);
      letter-spacing: -0.72px;
      margin-bottom: var(--space-4);
    }

    .comparison-table-wrapper {
      width: 100%;
      overflow-x: auto;
      border-radius: var(--radius-xl);
      border: 1px solid var(--border-secondary);
      box-shadow: var(--shadow-sm);
    }

    .comparison-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    .comparison-table th,
    .comparison-table td {
      padding: var(--space-4) var(--space-6);
      border-bottom: 1px solid var(--border-secondary);
    }

    .comparison-table tr:last-child td {
      border-bottom: none;
    }

    /* Column Sizing */
    .col-feature { width: 40%; min-width: 240px; }
    .col-tier { width: 20%; min-width: 160px; text-align: center; }

    /* Sticky Header Row */
    .thead-sticky th {
      position: sticky;
      top: 0;
      background: var(--bg-primary);
      z-index: 10;
      border-bottom: 1px solid var(--border-secondary);
      box-shadow: 0 1px 0 var(--border-secondary); /* ensures solid line when scrolling */
    }

    /* Recommended Tier Highlight */
    .col-recommended {
      background: var(--bg-brand-primary);
      position: relative;
    }
    
    .thead-sticky th.col-recommended {
      background: var(--bg-brand-primary);
    }

    /* Add top border to the recommended header */
    .thead-sticky th.col-recommended::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--border-brand);
    }

    .tier-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
    }

    .tier-name {
      font-size: var(--text-lg);
      font-weight: var(--font-semibold);
      color: var(--text-primary);
    }

    .tier-price {
      font-size: var(--text-sm);
      color: var(--text-secondary);
    }

    .feature-name {
      font-weight: var(--font-medium);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    /* Icons */
    .icon-check {
      color: var(--fg-success-primary);
      margin: 0 auto;
    }
    .icon-x {
      color: var(--fg-quaternary);
      margin: 0 auto;
    }

    /* Zebra Striping */
    .comparison-table tbody tr:nth-child(even) td:not(.col-recommended) {
      background: var(--bg-secondary);
    }

    .comparison-table tbody tr:nth-child(even) td.col-recommended {
      background: var(--bg-brand-secondary);
    }

    /* Footer CTAs */
    .tfoot-ctas td {
      padding-top: var(--space-6);
      padding-bottom: var(--space-6);
      text-align: center;
      background: var(--bg-primary);
    }
    
    .tfoot-ctas td.col-recommended {
      background: var(--bg-brand-primary);
    }

  </style>
</head>
