<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>SLA Grid — UntitledUI Variant 4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      /* BACKGROUNDS */
      --bg-primary: rgb(255 255 255);
      --bg-secondary: rgb(250 250 250);
      --bg-tertiary: rgb(245 245 245);
      --bg-brand-secondary: rgb(244 235 255);

      /* TEXT */
      --text-primary: rgb(24 29 39);
      --text-secondary: rgb(65 70 81);
      --text-tertiary: rgb(83 88 98);
      --text-brand-primary: rgb(66 48 125);
      --text-success-primary: rgb(7 148 85);
      --text-error-primary: rgb(217 45 32);

      /* FOREGROUND / ICONS */
      --fg-brand-primary: rgb(127 86 217);

      /* BORDERS */
      --border-primary: rgb(213 215 218);
      --border-secondary: rgb(233 234 235);

      /* UTILITY SCALES */
      --utility-success-500: rgb(18 183 106);
      --utility-warning-500: rgb(247 144 9);
      --utility-error-500: rgb(240 68 56);
      --utility-gray-200: rgb(233 234 235);

      /* TYPOGRAPHY */
      --font-body: 'Inter', system-ui, -apple-system, sans-serif;
      --font-display: 'Inter', system-ui, -apple-system, sans-serif;

      --text-sm: 0.875rem;
      --text-md: 1rem;
      --text-lg: 1.125rem;
      --display-md: 2.25rem;
      --display-lg: 3rem;

      --leading-sm: 1.25rem;
      --leading-md: 1.5rem;
      --leading-display-md: 2.75rem;
      --leading-display-lg: 3.75rem;

      --font-medium: 500;
      --font-semibold: 600;

      /* SPACING */
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-12: 3rem;

      /* BORDER RADIUS */
      --radius-sm: 0.25rem;
      --radius-xl: 0.75rem;
      --radius-full: 9999px;

      /* SHADOWS */
      --shadow-sm: 0px 1px 3px rgba(10, 13, 18, 0.1), 0px 1px 2px -1px rgba(10, 13, 18, 0.1);
      --shadow-md: 0px 4px 6px -1px rgba(10, 13, 18, 0.1), 0px 2px 4px -2px rgba(10, 13, 18, 0.06);

      /* CONTAINER */
      --container-max: 1280px;
      --container-padding: var(--space-8);
    }

    /* BASE STYLES */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; }
    body { font-family: var(--font-body); font-size: var(--text-md); line-height: var(--leading-md); color: var(--text-primary); background: var(--bg-secondary); }
    .page-container { max-width: var(--container-max); margin: 0 auto; padding: var(--space-12) var(--container-padding); }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; } }
    svg { display: block; flex-shrink: 0; }

    /* COMPONENTS */
    .card { background: var(--bg-primary); border: 1px solid var(--border-secondary); border-radius: var(--radius-xl); box-shadow: var(--shadow-sm); padding: var(--space-6); transition: box-shadow 200ms ease, border-color 200ms ease; }
    .card:hover { box-shadow: var(--shadow-md); border-color: var(--border-primary); }

    .badge { display: inline-flex; align-items: center; gap: var(--space-1); border-radius: var(--radius-full); font-family: var(--font-body); font-weight: var(--font-medium); padding: 4px var(--space-3); font-size: var(--text-sm); background: var(--bg-tertiary); color: var(--text-secondary); border: 1px solid var(--border-secondary); }

    /* LAYOUT SPECIFIC */
    .sla-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: var(--space-8); padding-bottom: var(--space-4); border-bottom: 1px solid var(--border-secondary); }
    .sla-title { font-size: var(--display-md); font-weight: var(--font-semibold); line-height: var(--leading-display-md); letter-spacing: -0.02em; }
    
    .sla-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-6); }
    @media (max-width: 768px) { .sla-grid { grid-template-columns: 1fr; } }

    .metric-name { font-size: var(--text-lg); font-weight: var(--font-semibold); color: var(--text-primary); margin-bottom: var(--space-2); }
    .metric-value-group { display: flex; align-items: center; gap: var(--space-4); margin-bottom: var(--space-1); }
    .metric-value { font-size: var(--display-lg); font-weight: var(--font-bold); line-height: var(--leading-display-lg); letter-spacing: -0.02em; }
    
    .trend-indicator { display: inline-flex; align-items: center; gap: var(--space-1); font-size: var(--text-sm); font-weight: var(--font-medium); padding: var(--space-1) var(--space-2); border-radius: var(--radius-full); }
    .trend-indicator--up { background: rgb(236 253 243); color: var(--text-success-primary); }
    .trend-indicator--down { background: rgb(254 243 242); color: var(--text-error-primary); }

    .metric-target { font-size: var(--text-sm); color: var(--text-tertiary); margin-bottom: var(--space-6); }

    .progress-track { width: 100%; height: 8px; background: var(--utility-gray-200); border-radius: var(--radius-full); overflow: hidden; position: relative; }
    .progress-bar { height: 100%; border-radius: var(--radius-full); transition: width 300ms ease; }
    
    .bg-success { background: var(--utility-success-500); }
    .bg-warning { background: var(--utility-warning-500); }
    .bg-error { background: var(--utility-error-500); }
  </style>
</head>
<body>
  <div class="page-container">
    <section>
      
      <header class="sla-header">
        <div>
          <h1 class="sla-title">SLA Performance</h1>
          <p style="color: var(--text-secondary); margin-top: var(--space-2);">Real-time metrics against service level objectives.</p>
        </div>
        <span class="badge">Last 30 Days</span>
      </header>

      <div class="sla-grid">
        
        <!-- Metric 1 -->
        <article class="card">
          <h2 class="metric-name">Uptime</h2>
          <div class="metric-value-group">
            <span class="metric-value">99.99%</span>
            <span class="trend-indicator trend-indicator--up">
              <svg width="16" height="16" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M5 15l7-7 7 7"/></svg>
              0.01%
            </span>
          </div>
          <div class="metric-target">Target: 99.95%</div>
          <div class="progress-track">
            <div class="progress-bar bg-success" style="width: 98%;"></div>
          </div>
        </article>

        <!-- Metric 2 -->
        <article class="card">
          <h2 class="metric-name">Response Time (p95)</h2>
          <div class="metric-value-group">
            <span class="metric-value">210ms</span>
            <span class="trend-indicator trend-indicator--down">
              <svg width="16" height="16" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M19 9l-7 7-7-7"/></svg>
              12ms
            </span>
          </div>
          <div class="metric-target">Target: &lt;250ms</div>
          <div class="progress-track">
            <div class="progress-bar bg-warning" style="width: 84%;"></div>
          </div>
        </article>

        <!-- Metric 3 -->
        <article class="card">
          <h2 class="metric-name">Error Rate</h2>
          <div class="metric-value-group">
            <span class="metric-value">0.4%</span>
            <span class="trend-indicator trend-indicator--down">
              <svg width="16" height="16" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M19 9l-7 7-7-7"/></svg>
              0.2%
            </span>
          </div>
          <div class="metric-target">Target: &lt;0.5%</div>
          <div class="progress-track">
            <div class="progress-bar bg-error" style="width: 80%;"></div>
          </div>
        </article>

        <!-- Metric 4 -->
        <article class="card">
          <h2 class="metric-name">Throughput</h2>
          <div class="metric-value-group">
            <span class="metric-value">4.2k/s</span>
            <span class="trend-indicator trend-indicator--up">
              <svg width="16" height="16" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M5 15l7-7 7 7"/></svg>
              1.1k
            </span>
          </div>
          <div class="metric-target">Capacity: 5.0k/s</div>
          <div class="progress-track">
            <div class="progress-bar bg-success" style="width: 84%;"></div>
          </div>
        </article>

      </div>

    </section>
  </div>
</body>
</html>
