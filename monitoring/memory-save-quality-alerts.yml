groups:
  - name: memory-save-quality
    rules:
      - alert: MemorySaveFrontmatterTierDrift
        expr: increase(memory_save_frontmatter_tier_drift_total[15m]) > 0
        for: 0m
        labels:
          severity: page
          area: memory-save
        annotations:
          summary: Frontmatter tier drift detected in the memory save pipeline
          description: CHECK-D4 should stay at zero after the PR-3 parity fix. Any increase in the last 15 minutes pages immediately.

      - alert: MemorySaveGitProvenanceMissing
        expr: increase(memory_save_git_provenance_missing_total[1h]) > 5
        for: 0m
        labels:
          severity: warn
          area: memory-save
        annotations:
          summary: Missing git provenance is spiking in JSON-mode saves
          description: The D7 guardrail exceeded the iteration-24 warning threshold of more than 5 missing-provenance saves per hour.

      - alert: MemorySaveDurationP95High
        expr: histogram_quantile(0.95, sum by (le) (rate(memory_save_duration_seconds_bucket[30m]))) > 0.5
        for: 30m
        labels:
          severity: warn
          area: memory-save
        annotations:
          summary: Memory save duration p95 is above the Phase 4 warning threshold
          description: The save-boundary telemetry exceeded the iteration-24 p95 threshold of 500ms for 30 minutes.
