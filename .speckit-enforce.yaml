# Spec Folder Quality Enforcement Configuration
# Controls validation behavior for spec documents.
#
# Modes:
#   warn   — show warnings but allow
#   block  — block on errors (allow warnings)
#   strict — block on errors AND warnings
#
enforcement:
  mode: block
  new_folder_mode: block
  created_after: "2026-03-22"

# Fast rule subset for validation (6 rules).
# Full 18-rule suite runs via validate.sh directly.
validation_rules:
  - FILE_EXISTS
  - LEVEL_DECLARED
  - FRONTMATTER_VALID
  - TEMPLATE_SOURCE
  - ANCHORS_VALID
  - FOLDER_NAMING
