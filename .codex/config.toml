model_auto_compact_token_limit = 750000

approval_policy = "never"
sandbox_mode = "danger-full-access"
[mcp_servers.sequential_thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]
 
[mcp_servers.spec_kit_memory]
command = "node"
args = [".opencode/skill/system-spec-kit/mcp_server/dist/context-server.js"]

[mcp_servers.spec_kit_memory.env]
EMBEDDINGS_PROVIDER = "auto"
MEMORY_DB_PATH = ".opencode/skill/system-spec-kit/mcp_server/database/context-index.sqlite"
SPECKIT_SESSION_BOOST = "true"
SPECKIT_CAUSAL_BOOST = "true"
_NOTE_1_DATABASE = "Stores vectors in: .opencode/skill/system-spec-kit/mcp_server/database/context-index.sqlite"
_NOTE_2_PROVIDERS = "Supports: Voyage (1024 dims), OpenAI (1536/3072 dims), HF Local (768 dims, no API needed)"
_NOTE_3_EMBEDDINGS_PROVIDER = "Current: 'hf-local' (free, offline). Options: 'auto', 'voyage', 'openai'"
_NOTE_4_CLOUD_PROVIDERS = "For cloud: add VOYAGE_API_KEY or OPENAI_API_KEY and set EMBEDDINGS_PROVIDER=auto"
_NOTE_5_GET_VOYAGE_KEY = "Get Voyage key: https://dash.voyageai.com/api-keys (recommended, 8% better than OpenAI)"
_NOTE_6_GET_OPENAI_KEY = "Get OpenAI key: https://platform.openai.com/api-keys"
_NOTE_7_FEATURE_FLAGS = "Opt-out flags (all default ON): SPECKIT_ADAPTIVE_FUSION, SPECKIT_EXTENDED_TELEMETRY, SPECKIT_SESSION_BOOST, SPECKIT_CAUSAL_BOOST"

[mcp_servers.cocoindex_code]
command = ".opencode/skill/mcp-coco-index/mcp_server/.venv/bin/ccc"
args = ["mcp"]

[mcp_servers.cocoindex_code.env]
COCOINDEX_CODE_ROOT_PATH = "."
_NOTE_1 = "Install: bash .opencode/skill/mcp-coco-index/scripts/install.sh"
_NOTE_2 = "Default embedding: all-MiniLM-L6-v2 (local, no API key needed)"
_NOTE_3 = "Index stored in .cocoindex_code/ (gitignored)"

[mcp_servers.code_mode]
command = "node"
args = [".opencode/skill/mcp-code-mode/mcp_server/dist/index.js"]

[mcp_servers.code_mode.env]
UTCP_CONFIG_FILE = ".utcp_config.json"

[features]
multi_agent = true
child_agents_md = true

# Profiles for codex exec -p <name> (non-interactive delegation)
[profiles.context]
sandbox_mode = "read-only"
model_reasoning_effort = "high"

[profiles.deep-review]
sandbox_mode = "workspace-write"
model_reasoning_effort = "high"

[profiles.debug]
sandbox_mode = "workspace-write"
model_reasoning_effort = "high"

[profiles.orchestrate]
sandbox_mode = "read-only"
model_reasoning_effort = "high"

[profiles.research]
sandbox_mode = "workspace-write"
model_reasoning_effort = "high"

[profiles.review]
sandbox_mode = "read-only"
model_reasoning_effort = "high"

[profiles.multi-ai-council]
sandbox_mode = "read-only"
model_reasoning_effort = "high"

[profiles.write]
sandbox_mode = "workspace-write"
model_reasoning_effort = "high"

# Agents for interactive multi-agent TUI (codex with multi_agent feature)
[agents.code]
description = "Application-code implementation specialist using sk-code for stack-aware execution."
config_file = "agents/code.toml"

[agents.create]
description = "Dedicated /create:* documentation executor using sk-doc templates."
config_file = "agents/create.toml"

[agents.context]
description = "Production context retrieval specialist (memory-first, read-only)."
config_file = "agents/context.toml"

[agents.debug]
description = "Debugging specialist for root-cause analysis and fix validation."
config_file = "agents/debug.toml"

[agents.orchestrate]
description = "Senior orchestrator for decomposition, delegation, and synthesis."
config_file = "agents/orchestrate.toml"

[agents.deep-research]
description = "Iterative investigation specialist with convergence detection."
config_file = "agents/deep-research.toml"

[agents.deep-review]
description = "LEAF review agent for sk-deep-review. Performs single review iteration: reads state, reviews one dimension with P0/P1/P2 findings, updates strategy and JSONL."
config_file = "agents/deep-review.toml"

[agents.improve-agent]
description = "Proposal-only mutator for bounded improve-agent candidate generation with evaluator-first rules"
config_file = "agents/improve-agent.toml"

[agents.improve-prompt]
description = "Improve-prompt specialist for framework selection, CLEAR validation, and dispatch-ready prompt packages for high-stakes external CLI invocations"
config_file = "agents/improve-prompt.toml"

[agents.review]
description = "Code review specialist focused on correctness, risk, and tests."
config_file = "agents/review.toml"

[agents.multi-ai-council]
description = "Multi-strategy planning architect for diverse reasoning and optimal plans."
config_file = "agents/multi-ai-council.toml"
