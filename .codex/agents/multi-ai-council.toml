    │       regression risk third
    │
    ├─► Architecture
    │   └─► Analytical + Critical + Holistic (N=3)
    │       Vantages sought: cli-claude-code, native @deep-research, cli-copilot
    │       Rationale: Balance structure, risk, and system fit
    │
    ├─► Research / Unknowns
    │   └─► Research + Critical + Creative (N=3)
