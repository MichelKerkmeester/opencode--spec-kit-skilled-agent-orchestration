description = "Evaluator-first proposal loop for bounded agent-improver experiments with target profiles, deterministic benchmarks, and guarded promotion controls"
prompt = '''
---
description: Evaluator-first proposal loop for bounded agent-improver experiments with target profiles, deterministic benchmarks, and guarded promotion controls.
argument-hint: "[target] [:auto|:confirm] [--spec-folder=PATH] [--iterations=N]"
allowed-tools: Read, Write, Edit, Bash, Grep, Glob, Task
---

# Improve Agent

Evaluate and improve any agent across 5 integration-aware dimensions with proposal-first candidates, deterministic scoring, and guarded promotion.

**Mandatory Gate**: If `target_path`, `spec_folder`, `execution_mode`, or `max_iterations` are still unresolved, ask one consolidated setup prompt before loading any YAML workflow.

## 1. PURPOSE

Run a bounded evaluator-first loop that proposes agent candidates, scores them independently, runs deterministic profile benchmarks, appends evidence to a ledger, and stops before any out-of-scope canonical file mutation.

## 2. CONTRACT

**Inputs:** target path (`.opencode/agent/handover.md` or `.opencode/agent/context-prime.md`), spec folder, execution mode, max iterations

**Outputs:** improvement packet state under `{spec_folder}/improvement/`

## 3. INSTRUCTIONS

### Step 1: Resolve Setup Values

Resolve these values before loading any YAML workflow:
- `target_path`
- `target_profile`
- `spec_folder`
- `execution_mode`
- `max_iterations`

### Step 2: Resolve Target and Mode

Use these rules:
- `:auto` suffix -> `execution_mode = "AUTONOMOUS"`
- `:confirm` suffix -> `execution_mode = "INTERACTIVE"`
- no suffix -> `execution_mode = "ASK"`
- explicit `.opencode/agent/handover.md` -> `target_profile = "handover"`
- explicit `.opencode/agent/context-prime.md` -> `target_profile = "context-prime"`
- any other `.opencode/agent/*.md` path -> `target_profile = "dynamic"` (use `--dynamic` scoring mode with `generate-profile.cjs`)
- no explicit target -> default to `.opencode/agent/handover.md`
- `--spec-folder=PATH` sets the spec folder
- `--iterations=N` sets the iteration cap
- if no iteration flag is provided, default `max_iterations = 5`

### Step 3: Ask One Consolidated Setup Prompt When Needed

If setup values are missing, ask one consolidated setup prompt that covers only the unresolved values:
- spec folder choice
- execution mode when no suffix was provided
- iteration count when not provided

### Step 4: Load the Matching YAML Workflow

Only after setup values are fully resolved:
- auto mode -> `assets/improve_agent-improver_auto.yaml`
- confirm mode -> `assets/improve_agent-improver_confirm.yaml`

Execute that YAML workflow step by step.

### Step 5: Enforce Command Constraints

- Do not dispatch agents from this markdown command body
- YAML owns loop execution once setup is resolved
- Proposal-first mode is the default posture
- Only `.opencode/agent/handover.md` is promotion-eligible in the current packet
- Use `@agent-improver` when the YAML workflow requests a proposal-only mutator

### Step 6: Use Runtime Path Resolution Consistently

Use `[runtime_agent_path]` based on the active runtime profile:
- Default/Copilot: `.opencode/agent`
- Codex: `.codex/agents`
- Claude: `.claude/agents`
- Gemini: `.gemini/agents`

## 4. EXAMPLES

```text
/improve:agent-improver ".opencode/agent/handover.md" :confirm --spec-folder={spec_folder}
/improve:agent-improver ".opencode/agent/context-prime.md" :auto --spec-folder={spec_folder} --iterations=3
```

## 5. NOTES

Guarded promotion is available only when:
- only after a `candidate-better` score
- only after a `benchmark-pass` report already exists for the active profile
- only after a passing repeatability report exists for that same active profile
- only in confirm mode with explicit approval
- only for the single manifest-backed canonical target `.opencode/agent/handover.md`
- `context-prime` is a candidate-only target in this packet

Primary skill: `.opencode/skill/sk-improve-agent/SKILL.md`
'''
